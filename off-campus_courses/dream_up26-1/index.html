<style>
  :root{
    --ink:#12213a;
    --ink-soft:#5a6b85;
    --line:#dbe3ee;
    --paper:#f6f8fc;
    --brand:#1a5fa8;
    --brand-deep:#0f3f74;
    --pass:#1c7a5e;
    --pass-bg:#e8f6f1;
    --hold:#b4531f;
    --hold-bg:#fdf1e7;
    --shadow:0 1px 2px rgba(18,33,58,.05), 0 12px 32px -18px rgba(18,33,58,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;
    background:var(--paper); color:var(--ink);
    line-height:1.6; -webkit-text-size-adjust:100%;
    padding:28px 18px 64px;
  }
  .wrap{max-width:520px;margin:0 auto}

  header{margin-bottom:26px}
  .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:.14em;
    color:var(--brand); margin:0 0 10px;
  }
  h1{
    font-size:25px; font-weight:800; letter-spacing:-.02em;
    margin:0 0 8px; line-height:1.32;
  }
  .lede{margin:0; font-size:14px; color:var(--ink-soft)}

  .card{
    background:#fff; border:1px solid var(--line); border-radius:16px;
    padding:24px 22px; box-shadow:var(--shadow);
  }
  .field{margin-bottom:16px}
  .field:last-of-type{margin-bottom:22px}
  label{display:block; font-size:13px; font-weight:700; margin-bottom:7px}
  .hint{font-weight:500; color:var(--ink-soft); font-size:12px; margin-left:5px}
  input,select{
    width:100%; font:inherit; font-size:16px; color:var(--ink);
    padding:12px 13px; border:1px solid var(--line); border-radius:10px;
    background:#fff; appearance:none;
  }
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235a6b85' stroke-width='1.6'/></svg>");
    background-repeat:no-repeat; background-position:right 13px center; padding-right:34px}
  input:focus,select:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand)}
  .row{display:flex; gap:10px}
  .row .field{flex:1}

  button{
    width:100%; font:inherit; font-size:16px; font-weight:700; color:#fff;
    background:var(--brand); border:0; border-radius:10px; padding:14px;
    cursor:pointer; transition:background .15s;
  }
  button:hover:not(:disabled){background:var(--brand-deep)}
  button:disabled{background:#a9bcd4; cursor:progress}
  button:focus-visible{outline:2px solid var(--brand-deep); outline-offset:2px}

  .msg{
    margin-top:16px; font-size:14px; padding:13px 15px; border-radius:10px;
    background:#fdf1f1; color:#a3312f; border:1px solid #f3d6d5;
  }
  .msg[hidden]{display:none}

  /* 결과 */
  .result{margin-top:22px}
  .result[hidden]{display:none}
  .badge{
    display:inline-block; font-size:13px; font-weight:800; letter-spacing:.02em;
    padding:6px 13px; border-radius:999px; margin-bottom:14px;
  }
  .badge.pass{background:var(--pass-bg); color:var(--pass)}
  .badge.hold{background:var(--hold-bg); color:var(--hold)}
  .who{font-size:19px; font-weight:800; margin:0 0 18px; letter-spacing:-.01em}
  .who span{font-weight:500; color:var(--ink-soft); font-size:14px}

  dl{margin:0; border-top:1px solid var(--line)}
  .item{display:flex; gap:14px; padding:13px 2px; border-bottom:1px solid var(--line)}
  dt{flex:0 0 76px; margin:0; font-size:13px; font-weight:600; color:var(--ink-soft)}
  dd{margin:0; font-size:15px; font-weight:600; flex:1; word-break:keep-all}
  .hours{font-size:15px}
  .hours b{font-size:22px; font-weight:800; letter-spacing:-.02em}

  .note{
    margin-top:18px; font-size:13px; line-height:1.65; color:var(--ink-soft);
    background:var(--paper); border:1px solid var(--line);
    border-radius:10px; padding:14px 15px;
  }
  .note strong{color:var(--ink)}

  footer{margin-top:26px; font-size:12px; color:var(--ink-soft); line-height:1.7}
  footer p{margin:0 0 4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div class="wrap">

  <header>

  <main class="card">

      </div>
    </div>

    <div class="field">
      <label for="name">이름</label>
      <input id="name" type="text" autocomplete="off" placeholder="이름">
    </div>

    <button id="go" type="button">이수 결과 확인</button>
    <p class="msg" id="msg" hidden role="alert"></p>

    <section class="result" id="res" aria-live="polite">
      <span class="badge" id="badge"></span>
      <p class="who" id="who"></p>
      <dl>
        <div class="item"><dt>대학</dt><dd id="univ"></dd></div>
        <div class="item"><dt>강좌</dt><dd id="course"></dd></div>
        <div class="item"><dt>이수 시간</dt><dd class="hours" id="hours"></dd></div>
      </dl>
      <p class="note" id="note"></p>
    </section>
  </main>

  <footer>
    <p>결과가 사실과 다르면 충청남도교육청 중등교육과 고교교육과정지원센터로 문의바랍니다.</p>
    <p>Tel: 041-640-7221, 041-640-7224</p>
    <p>이 페이지는 조회한 내용을 저장하거나 외부로 전송하지 않습니다.</p>
    <p>확인 기간이 끝나면 페이지가 닫힙니다.</p>
  </footer>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var DB = null, tries = 0;

  try {
    DB = JSON.parse(document.getElementById('db').textContent);
    var s = $('sch');
    DB.schools.forEach(function(n){
      var o = document.createElement('option'); o.value = n; o.textContent = n; s.appendChild(o);
    });
  } catch(e) {
    show('자료를 불러오지 못했습니다. 새로고침해 주세요.');
  }

  if(!(window.crypto && crypto.subtle)){
    show('이 브라우저에서는 조회할 수 없습니다. 최신 크롬·사파리·엣지에서 열어 주세요.');
  }

  function show(t){ var m = $('msg'); m.textContent = t; m.hidden = false; $('res').hidden = true; }
  function hide(){ $('msg').hidden = true; }

  function norm(s){ return s.normalize('NFC').replace(/\s+/g, ''); }

  async function keyOf(sch, gr, sid, name){
    var raw = sch + '|' + gr + '|' + sid + '|' + name;
    var mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(raw), 'PBKDF2', false, ['deriveBits']);
    var bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt:new TextEncoder().encode(DB.salt), iterations:DB.iter, hash:'SHA-256' },
      mat, 128);
    return Array.from(new Uint8Array(bits)).map(function(b){
      return b.toString(16).padStart(2,'0'); }).join('');
  }

  async function lookup(){
    if(!DB){ show('자료를 불러오는 중입니다. 잠시 후 다시 시도하세요.'); return; }
    hide();
    var sch = $('sch').value, gr = $('gr').value;
    var sid = norm($('sid').value), name = norm($('name').value);
    if(!sch || !gr || !sid || !name){ show('네 항목을 모두 입력해 주세요.'); return; }
    if(tries >= 12){ show('조회 시도가 많습니다. 잠시 후 다시 시도해 주세요.'); return; }
    tries++;

    var btn = $('go');
    btn.disabled = true; btn.textContent = '확인하는 중…';
    try {
      var hit = DB.r[await keyOf(norm(sch), gr, sid, name)];
      if(!hit){
        show('일치하는 자료가 없습니다. 학교·학년·학번·이름을 다시 확인해 주세요. 학교 밖 교육을 신청하지 않았다면 결과가 없습니다.');
        return;
      }
      render(hit);
    } finally {
      btn.disabled = false; btn.textContent = '이수 결과 확인';
    }
  }

  function render(d){
    var name = d[0], univ = d[1], course = d[2], done = d[3] === 1, hours = d[4];
    var b = $('badge');
    b.textContent = done ? '이수' : '미이수';
    b.className = 'badge ' + (done ? 'pass' : 'hold');
    $('who').innerHTML = name + ' <span>학생</span>';
    $('univ').textContent = univ;
    $('course').textContent = course;
    $('hours').innerHTML = '<b>' + hours + '</b>시간';
    $('note').innerHTML = done
      ? '이수 결과는 소속 학교로 공문 안내되었으며, <strong>학교생활기록부 창의적체험활동(진로활동)에 기재</strong>됩니다. 기재 시기와 방법은 학교 방침에 따릅니다.'
      : '이수 기준에 미치지 못해 <strong>학교생활기록부에 기재되지 않습니다.</strong> 표시된 시간은 실제 출석한 시간입니다.';
    $('res').hidden = false;
    $('res').scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  $('go').addEventListener('click', lookup);
  ['sid','name'].forEach(function(id){
    $(id).addEventListener('keydown', function(e){ if(e.key === 'Enter') lookup(); });
  });
})();
</script>
