<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026학년도 1학기 참학력 온라인 공동교육과정 교수·학습 도움 자료집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a2230;
  --ink-soft:#414c5e;
  --ink-faint:#6b7688;
  --paper:#f6f4ee;
  --paper-2:#fbfaf6;
  --card:#ffffff;
  --line:#e2ddd1;
  --line-strong:#cfc8b8;
  --sea:#1f5f6b;          /* 참학력 signature — 충남 바다/청람 */
  --sea-deep:#123c45;
  --sea-tint:#e6f0f0;
  --gold:#b7883a;
  --gold-tint:#f4ebd8;
  /* category accents */
  --cat-health:#c05353;
  --cat-science:#2f7d8a;
  --cat-humanities:#7a5aa8;
  --cat-engineer:#3a6ea5;
  --cat-work:#b07a2e;
  --cat-art:#4a8c5f;
  --cat-etc:#7a7a7a;
  --shadow:0 1px 2px rgba(26,34,48,.06),0 8px 28px -12px rgba(26,34,48,.18);
  --shadow-lg:0 2px 4px rgba(26,34,48,.08),0 24px 60px -24px rgba(26,34,48,.32);
  --radius:14px;
  --sans:'IBM Plex Sans KR',system-ui,sans-serif;
  --serif:'Gowun Batang',serif;
  --mono:'IBM Plex Mono',monospace;
  --sidebar-w:312px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--sans);color:var(--ink);
  background:var(--paper);line-height:1.72;
  font-weight:400;-webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum";
}
a{color:inherit}

/* ===================== LAYOUT ===================== */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
  background:linear-gradient(178deg,var(--sea-deep),var(--sea) 62%,#1a555f);
  color:#eaf2f1;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;
  border-right:1px solid rgba(0,0,0,.15);
  z-index:40;
}
.sb-head{padding:26px 24px 18px;border-bottom:1px solid rgba(255,255,255,.13)}
.sb-kicker{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:#a9d2d1;font-weight:600;margin-bottom:9px;
}
.sb-title{
  font-family:var(--serif);font-weight:700;font-size:19px;line-height:1.42;
  color:#fff;margin:0;
}
.sb-sub{font-size:12px;color:#bcdad9;margin-top:8px;letter-spacing:.01em}
.sb-search{padding:16px 18px 8px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55}
#search{
  width:100%;padding:10px 12px 10px 36px;border-radius:9px;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.09);
  color:#fff;font-family:var(--sans);font-size:13.5px;outline:none;
}
#search::placeholder{color:#a9c7c6}
#search:focus{border-color:#8fd0ce;background:rgba(255,255,255,.14)}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px 24px}
.sb-nav::-webkit-scrollbar{width:8px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:4px}
.nav-home{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  padding:10px 12px;margin:8px 4px 4px;border-radius:9px;cursor:pointer;
  background:transparent;border:none;color:#dcecec;font-family:var(--sans);
  font-size:13.5px;font-weight:500;
}
.nav-home:hover{background:rgba(255,255,255,.09)}
.nav-home.active{background:rgba(255,255,255,.16);color:#fff}
.nav-cat{margin-top:14px}
.nav-cat-label{
  font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:#8fbdbc;font-weight:600;padding:4px 14px;margin-bottom:2px;
  display:flex;align-items:center;gap:7px;
}
.nav-cat-dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px}
.nav-item{
  display:block;width:calc(100% - 8px);text-align:left;margin:1px 4px;
  padding:8px 12px 8px 30px;border-radius:8px;cursor:pointer;
  background:transparent;border:none;color:#cfe3e2;font-family:var(--sans);
  font-size:13px;line-height:1.4;position:relative;transition:background .12s;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.17);color:#fff;font-weight:500}
.nav-item .ni-sub{margin-left:6px;color:#94c1c0;font-size:11.5px}
.nav-item.active .ni-sub{color:#c9e6e5}
.nav-item::before{
  content:"";position:absolute;left:15px;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.4;
}
.sb-foot{padding:12px 20px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#a9c7c6}

.main{flex:1;min-width:0;position:relative}
.topbar{
  display:none;position:sticky;top:0;z-index:30;
  background:var(--sea-deep);color:#fff;padding:11px 16px;
  align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.topbar button{background:rgba(255,255,255,.14);border:none;color:#fff;
  width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center}
.topbar .tb-title{font-family:var(--serif);font-weight:700;font-size:14.5px;line-height:1.3}
.content{max-width:900px;margin:0 auto;padding:52px 48px 120px}

/* ===================== COVER / HOME ===================== */
.cover{
  position:relative;border-radius:22px;overflow:hidden;
  background:
    radial-gradient(120% 140% at 88% -10%,rgba(183,136,58,.28),transparent 46%),
    linear-gradient(160deg,var(--sea-deep),var(--sea) 68%,#1c5560);
  color:#fff;padding:60px 54px 54px;margin-bottom:44px;
  box-shadow:var(--shadow-lg);
}
.cover::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.09) 1px,transparent 1.4px);
  background-size:22px 22px;opacity:.5;mask-image:linear-gradient(120deg,transparent,black 60%);
}
.cover-badge{
  display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.14em;
  text-transform:uppercase;font-weight:600;color:#cbe6e4;
  border:1px solid rgba(255,255,255,.28);border-radius:100px;padding:6px 15px;margin-bottom:26px;
  position:relative;z-index:2;
}
.cover-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.cover h1{
  font-family:var(--serif);font-weight:700;font-size:clamp(28px,4.4vw,46px);
  line-height:1.28;margin:0 0 20px;position:relative;z-index:2;letter-spacing:-.01em;
}
.cover h1 .em{color:#f2d79a}
.cover-lead{
  font-size:16px;line-height:1.8;color:#dcecec;max-width:620px;
  position:relative;z-index:2;margin:0 0 34px;
}
.cover-stats{display:flex;flex-wrap:wrap;gap:14px;position:relative;z-index:2}
.cstat{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
  border-radius:13px;padding:15px 20px;min-width:104px;backdrop-filter:blur(4px);
}
.cstat .num{font-family:var(--serif);font-weight:700;font-size:29px;line-height:1;color:#fff}
.cstat .lab{font-size:11.5px;color:#bcdad9;margin-top:7px;letter-spacing:.03em}

.home-intro{margin:0 0 40px}
.section-eyebrow{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--sea);
}
.section-eyebrow::after{content:"";flex:1;height:1px;background:var(--line-strong)}
.home-intro p{font-size:15px;color:var(--ink-soft);max-width:680px}

.cat-block{margin-bottom:40px}
.cat-block-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.cat-block-head .cbh-dot{width:11px;height:11px;border-radius:50%;transform:translateY(1px)}
.cat-block-head h3{font-size:17px;font-weight:600;margin:0}
.cat-block-head .cbh-count{font-size:12.5px;color:var(--ink-faint);font-family:var(--mono)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}
.subj-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 20px 18px;cursor:pointer;text-align:left;font-family:var(--sans);
  position:relative;overflow:hidden;transition:transform .16s,box-shadow .16s,border-color .16s;
  display:flex;flex-direction:column;min-height:150px;
}
.subj-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,#888)}
.subj-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px}
.sc-subject{font-size:17px;font-weight:600;line-height:1.32;letter-spacing:-.01em}
.sc-cur{font-size:10.5px;font-family:var(--mono);color:#fff;background:var(--c,#888);
  padding:2px 7px;border-radius:6px;flex:0 0 auto;font-weight:500;letter-spacing:.02em}
.sc-unit{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:auto;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-meta{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:13px;
  border-top:1px solid var(--line);font-size:12px;color:var(--ink-faint)}
.sc-meta .sc-teacher{font-weight:500;color:var(--ink-soft)}
.sc-meta .sep{opacity:.4}
.sc-periods{margin-left:auto;font-family:var(--mono);font-size:11.5px;
  background:var(--paper);padding:2px 8px;border-radius:6px;color:var(--ink-soft)}

/* ===================== CHAPTER ===================== */
.chapter{animation:fade .32s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ch-hero{
  position:relative;border-radius:20px;overflow:hidden;color:#fff;
  padding:38px 40px 34px;margin-bottom:34px;box-shadow:var(--shadow);
  background:linear-gradient(155deg,var(--c-deep,#234),var(--c,#456) 90%);
}
.ch-hero::after{content:"";position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.1) 1px,transparent 1.3px);
  background-size:20px 20px;opacity:.4;mask-image:linear-gradient(130deg,transparent,black 70%)}
.ch-cat{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;letter-spacing:.14em;
  text-transform:uppercase;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:16px;
  position:relative;z-index:2}
.ch-cat .dot{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.9}
.ch-hero h2{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.4vw,34px);
  line-height:1.3;margin:0 0 8px;position:relative;z-index:2;letter-spacing:-.01em}
.ch-unit{font-size:15px;color:rgba(255,255,255,.9);position:relative;z-index:2;line-height:1.55}
.ch-hero-meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:22px;position:relative;z-index:2}
.chm{display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(255,255,255,.92)}
.chm svg{opacity:.8}
.chm .code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.16);
  padding:2px 9px;border-radius:6px}

.ch-actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:34px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:9px;
  font-size:13.5px;font-weight:500;font-family:var(--sans);cursor:pointer;
  border:1px solid var(--line-strong);background:var(--card);color:var(--ink);
  text-decoration:none;transition:background .12s,border-color .12s,transform .1s}
.btn:hover{background:var(--paper-2);border-color:var(--sea);transform:translateY(-1px)}
.btn.primary{background:var(--sea);color:#fff;border-color:var(--sea)}
.btn.primary:hover{background:var(--sea-deep)}
.btn svg{flex:0 0 auto}

/* standard callout */
.standard-box{
  background:linear-gradient(120deg,var(--sea-tint),#eef5f4);
  border:1px solid #cfe4e2;border-left:4px solid var(--sea);
  border-radius:12px;padding:20px 24px;margin-bottom:38px;
}
.standard-box .sb-lab{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;
  font-weight:600;color:var(--sea);margin-bottom:9px}
.standard-box p{margin:0;font-size:15.5px;line-height:1.72;color:var(--ink);font-family:var(--serif)}

.stage-head{display:flex;align-items:center;gap:14px;margin:44px 0 22px}
.stage-num{width:42px;height:42px;border-radius:11px;flex:0 0 42px;
  background:var(--sea);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:700;font-size:19px;box-shadow:var(--shadow)}
.stage-head h3{font-size:20px;font-weight:600;margin:0;letter-spacing:-.01em}
.stage-head .sh-sub{font-size:13px;color:var(--ink-faint);margin-top:2px}

/* analysis grid */
.a-grid{display:grid;gap:14px;margin-bottom:8px}
.a-row{display:grid;grid-template-columns:132px 1fr;gap:0;
  background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.a-row .a-lab{background:var(--paper);padding:16px 18px;font-size:13.5px;font-weight:600;
  color:var(--sea-deep);display:flex;align-items:center;border-right:1px solid var(--line)}
.a-row .a-val{padding:16px 20px;font-size:14.5px;color:var(--ink-soft);line-height:1.7}
.a-val ul{margin:0;padding:0;list-style:none}
.a-val li{position:relative;padding-left:16px;margin:4px 0}
.a-val li::before{content:"";position:absolute;left:2px;top:11px;width:5px;height:5px;
  border-radius:50%;background:var(--sea);opacity:.6}

/* content-elements trio */
.elements{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.el-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;
  position:relative;overflow:hidden}
.el-card .el-head{font-size:13px;font-weight:600;color:var(--sea-deep);margin-bottom:12px;
  padding-bottom:9px;border-bottom:1px dashed var(--line-strong);display:flex;align-items:center;gap:8px}
.el-card .el-head .el-ic{width:22px;height:22px;border-radius:7px;background:var(--sea-tint);
  color:var(--sea);display:flex;align-items:center;justify-content:center;flex:0 0 22px}
.el-card ul{margin:0;padding:0;list-style:none;font-size:13.5px;color:var(--ink-soft);line-height:1.62}
.el-card li{position:relative;padding-left:14px;margin:5px 0}
.el-card li::before{content:"";position:absolute;left:2px;top:9px;width:4px;height:4px;
  border-radius:50%;background:var(--sea);opacity:.55}
.el-card p{margin:0;font-size:13.5px;color:var(--ink-soft);line-height:1.62}

/* eval block */
.eval-wrap{background:var(--gold-tint);border:1px solid #e6d3a8;border-radius:12px;
  padding:6px 22px 8px;margin-bottom:14px}
.eval-item{padding:15px 0;border-bottom:1px dashed #ddc9a0}
.eval-item:last-child{border-bottom:none}
.eval-item .ev-lab{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
  color:var(--gold);margin-bottom:7px}
.eval-item .ev-val{font-size:14px;color:var(--ink-soft);line-height:1.68}
.eval-item ul{margin:0;padding:0;list-style:none}
.eval-item li{position:relative;padding-left:15px;margin:4px 0}
.eval-item li::before{content:"";position:absolute;left:3px;top:10px;width:4px;height:4px;
  border-radius:50%;background:var(--gold)}

/* lessons */
.lessons-intro{font-size:13.5px;color:var(--ink-faint);margin:0 0 20px}
.lesson{background:var(--card);border:1px solid var(--line);border-radius:15px;
  margin-bottom:18px;overflow:hidden;box-shadow:0 1px 2px rgba(26,34,48,.04)}
.lesson-head{display:flex;align-items:center;gap:16px;padding:18px 22px;cursor:pointer;
  background:var(--paper-2);border-bottom:1px solid transparent;transition:background .14s;
  user-select:none}
.lesson-head:hover{background:var(--paper)}
.lesson.open .lesson-head{border-bottom-color:var(--line)}
.lesson-period{width:52px;height:52px;flex:0 0 52px;border-radius:12px;
  background:var(--sea);color:#fff;display:flex;flex-direction:column;align-items:center;
  justify-content:center;font-family:var(--mono);line-height:1}
.lesson-period .lp-cur{font-size:18px;font-weight:500}
.lesson-period .lp-tot{font-size:11px;opacity:.75;margin-top:2px}
.lesson-titles{flex:1;min-width:0}
.lesson-topic{font-size:15.5px;font-weight:600;line-height:1.42;letter-spacing:-.01em}
.lesson-concept{font-size:12.5px;color:var(--ink-faint);margin-top:4px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.lesson.open .lesson-concept{-webkit-line-clamp:unset;overflow:visible}
.lesson-chev{flex:0 0 auto;color:var(--ink-faint);transition:transform .22s}
.lesson.open .lesson-chev{transform:rotate(180deg)}
.lesson-body{display:none;padding:4px 22px 24px}
.lesson.open .lesson-body{display:block;animation:fade .26s ease}
.lb-methods{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 20px}
.method-chip{font-size:12px;padding:5px 12px;border-radius:100px;background:var(--sea-tint);
  color:var(--sea-deep);border:1px solid #cfe4e2;font-weight:500}
.method-chip.off{display:none}
.lb-concept{font-size:13.5px;color:var(--ink-soft);margin:0 0 20px;padding:12px 16px;
  background:var(--paper);border-radius:9px;border-left:3px solid var(--line-strong)}
.lb-concept b{color:var(--sea-deep);font-weight:600}
.steps{display:grid;gap:0;position:relative}
.step{display:grid;grid-template-columns:88px 1fr;gap:0;position:relative}
.step-label{padding:6px 16px 26px 0;text-align:right;position:relative}
.step-label .sl-name{font-size:13.5px;font-weight:600;color:var(--sea-deep)}
.step-marker{position:absolute;right:-6px;top:9px;width:12px;height:12px;border-radius:50%;
  background:var(--sea);border:3px solid var(--card);box-shadow:0 0 0 1px var(--line-strong);z-index:2}
.step-content{padding:2px 0 26px 26px;border-left:2px solid var(--line);position:relative}
.step:last-child .step-content{border-left-color:transparent}
.step-content .sc-text{font-size:14px;color:var(--ink-soft);line-height:1.74;white-space:pre-line}
.step-content .sc-text a{color:var(--sea);text-decoration:underline;text-underline-offset:2px;word-break:break-all}

/* nav footer */
.ch-pager{display:flex;gap:12px;margin-top:44px;padding-top:28px;border-top:1px solid var(--line)}
.pager-btn{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:16px 20px;cursor:pointer;text-align:left;font-family:var(--sans);transition:border-color .14s,box-shadow .14s;min-width:0}
.pager-btn:hover{border-color:var(--sea);box-shadow:var(--shadow)}
.pager-btn.next{text-align:right}
.pager-btn.empty{visibility:hidden}
.pager-dir{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.pager-title{font-size:14.5px;font-weight:600;margin-top:5px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PDF modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(18,24,34,.62);z-index:90;
  display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
.modal-backdrop.show{display:flex;animation:fade .2s ease}
.modal{background:var(--card);border-radius:16px;width:min(1000px,100%);height:min(90vh,100%);
  display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid var(--line)}
.modal-head .mh-title{font-size:14.5px;font-weight:600;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-head .mh-close{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);
  background:var(--paper);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-head .mh-close:hover{background:var(--line)}
.modal iframe{flex:1;border:none;width:100%;background:#525659}

.no-results{text-align:center;padding:60px 20px;color:var(--ink-faint)}
.no-results svg{opacity:.4;margin-bottom:16px}

려놓고 벨소리가 울려\n도 저 라디오는 너무 시끄럽다며 귀찮아합니다.\n- 사례 B (파킨슨병 케이스):\n\"82세 박 어르신은 침상에서 일어날 때 손과 팔이 부르르 떨리는 증상(안정 시 떨림)이 심해졌습니\n다. 걸음을 걸으실 때 상체가 앞으로 굽어있으며, 처음 발을 떼는 것을 매우 힘들어하십니다. 한번\n걷기 시작하면 멈추기 어려워하셔서 최근 화장실 앞으로 가다가 넘어질 뻔한 아찔한 상황이 있었습\n니다.\"\n- 사례 C (노년기 우울증 케이스):\n\"75세 이 어르신은 최근 배우자와 사별한 후 영양 섭취가 불량하고 매사에 의욕이 없으십니다. 간\n호사가 질문을 하면 한참 뒤에 겨우 대답을 하거나 대답을 회피하십니다. \"요새 자꾸 깜빡깜빡하는\n게 치매에 걸린 것 같다\"며 심한 건망증을 호소하시고 잠을 깊이 자지 못하십니다.“"}}], "id": "ch01", "pdf": "pdf/ch01.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(고급대수-한일고-이동규).pdf", "meta": {"curriculum": "2022", "subject": "고급대수", "teacher": "이동규(한일고등학교)", "unit": "III. 행렬과 선형변환", "code": "12고대03-01", "standard": "선형변환의 뜻을 알고, 행렬을 이용하여 선형변환을 표현할 수 있다.", "category": "과학·수학", "school": "한일고등학교", "teacher_name": "이동규"}, "stage1": {"total_periods": "3", "explanation": "벡터 공간에서의 사상 중 선형성을 만족하는 '선형변환'의 대수적 정의를 이해하\n고, 이를 판정할 수 있도록 한다. 나아가 표준기저벡터의 이동을 통해 임의의 선형\n변환을 행렬로 표현하는 원리를 학습하며, 회전·대칭·닮음변환 등 특수한 변환 행\n렬을 유도한다. 최종적으로 지오지브라(GeoGebra) 등 공학 도구를 활용하여 합성\n변환의 기하학적 매커니즘을 시각적으로 추론하고, 행렬의 곱셈이 갖는 대수적 성\n질(교환법칙 불성립 등)을 기하학적 변화와 연결하여 해석하는 디지털 소양과 융합\n적 탐구 능력을 함양한다.", "know": "⦁선형변환의 대수적 정의\n⦁표준기저벡터의 이동과 변환 행렬의 관계\n⦁특수한 선형변환(대칭변환, 닮음변환, 회전변환)의 행렬 표현\n⦁합성변환과 행렬의 곱셈 사이의 관계 및 성질", "skill": "⦁주어진 변환이 선형변환인지 대수적으로 판정하기\n⦁기하학적 조건(회전, 대칭 등)으로부터 이차정사각행렬 변환 행렬 유도하기\n⦁공학 도구를 활용하여 행렬의 연산 결과를 좌표평면 상에 시각화하고 추론하기", "value": "⦁행렬과 도형이 사상을 통해 통합되는 수학의 심미성과 유용성 인식\n⦁복잡한 기하학적 변화를 행렬을 통해 해결하려는 주도적 태도\n⦁공학 도구의 한계와 유용성을 비판적으로 인식하고 탐구에 활용하는 개방성", "eval_goal": "선형변환의 뜻과 행렬 표현의 원리를 명확히 이해하고 특수 변환 행렬을 유도할\n수 있으며, 공학 도구를 활용하여 합성변환의 기하학적 의미를 논리적으로 추론·발\n표할 수 있는가?", "eval_content": "⦁선형변환 정의 이해 및 기본 변환 행렬 도출\n⦁공학 도구를 활용한 회전, 대칭, 닮음 변환 시각화\n⦁변환의 합성과 역변환에 대한 수학적 추론 및 발표", "eval_method": "⦁수행평가 (공학 도구 활용 실습 및 탐구 보고서)\n⦁과정 중심 관찰 평가 (모둠 내 협력 및 문제 해결 과정)"}, "lessons": [{"topic": "선형변환의 뜻과 이차정사각행렬 표현", "concept": "선형변환, 단위 벡터의 이동, 변환 행렬", "method": "□ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[동기 유발 및 개념 열기]\n⦁애니메이션 및 게임 그래픽에서 캐릭터가 회전하거나 커지는 원리(좌표의 이동)\n에 대한 영상 제시\n⦁\"좌표평면 위의 수많은 점을 일정한 규칙으로 한 번에 이동시키려면 어떤 수학적\n도구가 필요할까?\" 질문 던지기", "body": "[문제 상황 속 개념 탐구]\n⦁선형변환의 보존성인 가산성과 동차성의 대수적 의미 탐구\n⦁단위 벡터   의 이동 결과를 통해 임의의 점의 변환 위치가 행렬로\n결정됨을 유도[기본 변환 행렬 구성]\n⦁축, 축, 원점, 직선 에 대한 대칭변환 행렬을 모둠별로 직접 계산하여\n도출하기", "closing": "[개념 정리 및 다음 차시 예고]\n⦁선형변환은 결국 행렬과의 1:1 대응임을 요약 및 강조\n⦁다음 차시에 진행될 지오지브라를 활용한 기하학적 실습 안내 및 기초 사용법(행\n렬 입력법) 예습 공지"}}, {"topic": "공학 도구를 활용한 선형변환의 기하학적 탐구", "concept": "회전변환 행렬, 합성변환", "method": "□ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[탐구 목표 확인]\n⦁원점을 중심으로 만큼 회전하는 변환을 행렬로 표현할 수 있을지 브레인스토\n밍· 공학 도구(지오지브라) 셋팅 및 모둠별 화면 공유 준비", "body": "[데이터 수집 및 수학적 유도]\n⦁삼각함수의 덧셈정리를 활용하여 회전변환 행렬을 교사와 함께 유도\n[디지털 시각화 및 결과 해석]\n⦁모둠별로 지오지브라에 임의의 다각형을 그리고, 행렬을 적용하여 회전하는 모습\n확인\n⦁대칭변환 행렬과 회전변환 행렬을 곱하여 '합성변환'을 만들고, 교환법칙\n(≠)이 성립하지 않음을 그래픽의 최종 위치 차이로 확인하고 토의하기", "closing": "[결과 공유 및 성찰]\n⦁모둠별로 조합한 '나만의 합성변환 행렬'과 그 기하학적 결과를 화면에 띄우고\n갤러리 워크 진행\n⦁대수와 기하가 행렬을 통해 연결됨을 성찰 일지로 작성하며 단원 마무리"}}, {"topic": "선형변환을 활용한 2D컴퓨터 그래픽스 모델링프로젝트", "concept": "선형변환의 실생활 응용, 합성변환의 설계", "method": "□ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[동기 유발 및 프로젝트 안내]\n⦁2차시에서 학습한 합성변환이 실제 컴퓨터 그래픽스(픽셀 이동, 크기 조절, 회전)\n에 어떻게 적용되는지 직업적 사례(게임 개발자, 애니메이터)와 연결하여 환기\n⦁프로젝트 목표 안내: 지오지브라를 활용하여 특정 애니메이션 동작(예: 걷기, 점\n프 후 회전 등)을 구현하기 위한 '변환 행렬 시퀀스' 설계하기", "body": "[변환 행렬 설계 및 실습]\n⦁모둠별로 지오지브라에 기본 캐릭터(간단한 다각형의 조합)를 디자인하여 좌표평\n면 위에 올리기\n⦁캐릭터가 특정 목적지까지 이동하며 회전 및 크기가 변하는 과정을 3단계 이상\n의 합성변환으로 기획하기\n⦁기획한 움직임을 구현하기 위해 필요한 변환 행렬을 각각 구하고, 최종 합성변환\n행렬을 수식으로 도출하기\n[디지털 시뮬레이션]\n⦁도출한 합성변환 행렬을 지오지브라에 입력하여 캐릭터가 의도한 대로 움직이는\n지 검증 및 오류 수정(디버깅)", "closing": "[발표 및 공유]\n⦁완성된 그래픽 애니메이션 과정과 사용된 행렬 수식을 마주온 또는 패들렛에 게\n시하여 상호 관람 및 발표\n[상호 평가 및 마무리]\n⦁루브릭을 활용하여 동료들의 수학적 논리성과 디자인 창의성 평가하기\n⦁수학(대수학)이 기술과 예술을 연결하는 강력한 도구임을 다 함께 성찰하며 수업\n마무리"}}], "id": "ch02", "pdf": "pdf/ch02.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(교육의 이해-공주여고-이화연).pdf", "meta": {"curriculum": "2015", "subject": "교육학", "teacher": "이화연 (공주여자고등학교)", "unit": "Ⅱ. 교육활동 (1)학습의 원리", "code": "[12교이02-01]", "standard": "학습에 대한 다양한 관점에 기반하여 학습의 의미와 원리를 이해하고 자신에게 맞 는 효과적인 학습 전략과 방법을 탐색하고 적용한다.", "category": "인문·사회", "school": "공주여자고등학교", "teacher_name": "이화연"}, "stage1": {"total_periods": "3차시", "explanation": "자신의 학습 과정이나 결과에 영향을 미치는 개인적·환경적 요소를 이해하고 자신\n의 학습에 도움이 되는 방향으로 이들 개인적·환경적 요소를 조성하거나 변화시키\n는 방안을 탐색하는 것을 강조한다.", "know": "• 학습의 원리와 방법\n• 교수의 원리와 방법", "skill": "• 효과적인 학습 전략과 방법을 탐색하고 적용하기\n• 효과적인 교수 전략과 방법을 탐색하고 적용하기", "value": "• 잘 배우고 잘 가르치려는 마음가짐과 태도", "eval_goal": "학습의 의미와 원리를 이해하고, 실제 교육 현안 및 학습 활동에 적용하여 자신의\n생각을 논리적으로 표현할 수 있다. 또한 모둠 협력 활동과 디지털 기반 결과물 제\n작을 통해 효과적인 학습 전략을 탐색하고, 교육사상가의 교육철학을 바탕으로 자\n신의 학습관을 성찰할 수 있다.", "eval_content": "• 교육 현안 제시글을 읽고 자신의 생각을 글로 논리적으로 서술하기\n• 모둠 토의를 통해 주제에 대한 의견을 비교·조정하고 토론에 참여하기\n• 학습의 원리 단원 내용을 정리하여 보드믹스 마인드맵 및 퀴즈로 제작하기\n• 교육사상가를 탐구하고 핵심 내용을 수기 정리 후 VRWE를 활용하여 교육사상가\n소개 영상을 제작하고 공유하기", "eval_method": "관찰평가, 발표평가, 개별산출물 평가, 자기 평가"}, "lessons": [{"topic": "교육 현안 토론을 통해 학습의 의미와 학습 환경 탐색하기", "concept": "학습의 의미, 학습에 영향을 미치는 환경, 자기주도적 학습, 토론과 의사소통", "method": "☑ 협동학습 ☑ 탐구학습 ☑ 문제중심학습 ☑ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ☑ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "• 학생의 창의성을 키우기 위한 교육방안, 교내 휴대폰 수거에 대한 찬반이라는 두"}}, {"topic": "학습의 원리를 협력적으로 정리하고 시각화하기", "concept": "학습의 원리, 협력적 학습, 개념 구조화, 시각화, 형성평가", "method": "☑ 협동학습 ☑ 탐구학습 □ 문제중심학습 ☑ 토의•토론학습", "period": "2/3", "steps": {}}, {"topic": "교육사상가 탐구를 통해 학습관과 교육관 확장하기", "concept": "교육사상가, 교육철학, 학습관, 탐구, 창의적 표현, 디지털 콘텐츠 제작", "method": "☑ 협동학습 ☑ 탐구학습 □ 문제중심학습 ☑ 토의•토론학습\n☑ 프로젝트 학습 □ 거꾸로학습 ☑ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "• 주요 교육사상가의 이름과 특징을 간단히 제시하여 학생의 흥미를 유발함.\n• 이번 수업에서는 자신이 탐구하고 싶은 교육사상가를 선정하여 핵심 교육철학과\n학습관을 조사하고, 이를 수기 자료와 영상으로 재구성하여 발표할 것임을 안내함.", "body": "[교육사상가 선정 및 탐구 방향 안내]\n• 자료: 교육사상가 안내 자료, 교과서, 사상가 목록 예시 자료\n• 교사는 주요 교육사상가의 핵심 특징을 간단히 소개한 뒤, 학생들이 관심 있는\n인물을 1명씩 선정하도록 함.\n• 탐구 시 포함해야 할 요소를 다음과 같이 제시함.\n- 사상가의 생애 또는 활동 배경\n- 핵심 교육철학\n- 학습에 대한 관점\n- 오늘날 교육에 주는 시사점\n[수기 탐구 자료 작성]\n• 자료: 탐구 활동지, 필기구, 색연필, 참고 자료"}}], "id": "ch03", "pdf": "pdf/ch03.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(국제정치-부석고-김주안).pdf", "meta": {"curriculum": "2022", "subject": "국제정치", "teacher": "김주안(부석고)", "unit": "Ⅱ. 국제 분쟁과 해결\n국제 분쟁 이슈 칼럼 작성하기", "code": "[12국정02-01],\n[12국정02-03]", "standard": "국제 분쟁의 의미를 파악하고 국제 분쟁의 원인과 양상에 대하여 설명할 수 있다. 국제 분쟁을 해결하기 위한 국제기구들의 활동을 탐색하고, 그 성과와 문제점에 대하여 토론할 수 있다.", "category": "인문·사회", "school": "부석고", "teacher_name": "김주안"}, "stage1": {"total_periods": "9차시", "explanation": "국제 분쟁의 의미와 유형을 파악하고, 분쟁의 원인과 해결 방안을 다양한 관점에서\n제시할 수 있다.", "know": "·국제 분쟁의 의미와 유형\n·국제 분쟁의 양상", "skill": "·국제 분쟁의 사례 조사하기\n·국제 분쟁의 원인과 결과 파악하기\n·국제 분쟁의 해결책 제시하기", "value": "·국제 분쟁에 대한 관심 가지기\n·세계 시민으로서의 의식을 갖춰 국제 분쟁에 대한 해결책을 생각하기", "eval_goal": "·국제 분쟁의 양상의 사례를 분석하기\n·국제 분쟁의 원인과 결과를 타당도와 신뢰도가 높은 자료를 활용해 논리적으로 분\n석하기\n·국제 분쟁의 해결책에 대한 자신의 의견을 논리적으로 제안하기", "eval_content": "① 국제 분쟁의 양상에 대한 사례 조사\n② 국제 분쟁의 원인 및 결과에 대한 신뢰도 및 타당도 높은 자료를 조사\n③ 헤딩 국제 분쟁이 왜 중요한지에 대해 정리하기\n④ 작성한 칼럼에 대해 명확한 제목과 헤드라인을 제시하기\n⑤ 칼럼에 대한 동료 평가 및 교사의 피드백에 대해 반영하기\n⑥ 칼럼에 대한 작성 동기, 내용 요약, 기반한 후속 탐구에 대한 자신의 의견 표현\n하기", "eval_method": "수행평가(칼럼 작성본 등)\n자기 평가(학습지)\n동료 평가(퀴즈앤 보드 상호 평가 포함)\n면접 평가(면접을 통해 칼럼 작성에 대한 동기, 내용에 대한 이해 및 논리성, 결론,\n추후 후속 탐구의 계획 등)"}, "lessons": [{"topic": "국제 분쟁 이슈 칼럼을 위한 자료 조사 및 작성하기", "concept": "·국제 분쟁의 양상, 원인 분석하기 ·국제 분쟁의 해결 방안 파악하기", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/9", "steps": {"intro": "[국제 분쟁에 대한 예시 확인하기]\n·국제 분쟁에 대해 떠오르는 것을 이야기를 나누며, 국제 분쟁의 의미를 이해함.\n또한, 국제 분쟁의 양상이 담긴 영상을 보며, 국제 분쟁의 심각성을 이해하고 해결\n의 필요성에 동감함.\n[활동 및 평가에 대한 전반적 안내]\n·활동의 진행 방안 및 평가 기준에 대해 학생들에게 안내하고 숙지하도록 함.\n·칼럼의 서론, 본론, 결론, 제목과 헤드라인에 들어가야 할 내용과 적절하게 작성하\n는 방법에 대해 안내함.", "body": "[칼럼 작성을 위한 자료 조사]\n·칼럼 작성을 위한 자료 수집을 진행할 때의 유의점인 자료의 신뢰도와 타당도에\n대해 생각하면서 수집할 수 있도록 안내하고 지도함. 특히 AI를 활용할 때의 주의\n점과 AI 사용 내역을 함께 첨부하여 칼럼에 제시할 것을 안내함.\n·자료를 수집할 때에 유용하게 활용할 수 있는 사이트(외교안보연구소, 한국국방연\n구원 등)들과 논문 및 보고서를 찾아볼 수 있는 사이트(DBpia, 구글 학술검색)들을\n소개하며, AI를 검색한 자료들을 검증하며 진행할 것을 강조함.\n제미나이를 활용한 자료 수집 동영상 플랫폼을 활용한 자료 수집"}}, {"topic": "국제 분쟁 이슈 칼럼에 대한 교사 및 동료 피드백 수\n용 및 재작성하기", "concept": "·국제 분쟁의 양상, 원인 분석하기 ·국제 분쟁의 해결 방안 파악하기", "method": "■ 협동학습 □ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "6/9", "steps": {"intro": "[교사 피드백 제공]\n·작성한 칼럼에 대해 교사가 미리 준비한 피드백을 제공해주고, 읽어보게 함.", "body": "[교사 피드백을 반영한 칼럼 재작성하기]"}}, {"topic": "국제 분쟁 이슈 칼럼에 대한 면접 평가", "concept": "·국제 분쟁의 양상, 원인 분석하기 ·국제 분쟁의 해결 방안 파악하기", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "9/9", "steps": {"intro": "[칼럼 작성법에 대한 안내]\n·지금까지 진행한 활동에 대해 돌아보게 하면서, 마지막으로 칼럼에 대한 자신의\n생각을 이야기해보는 시간임을 안내하며, 면접을 진행할 때의 유의점(비언어적(태\n도, 자세), 반언어적 표현(어투, 목소리 등)의 유의점, 두괄식 표현의 지향 등)을 설\n명함.\n·자신이 작성한 칼럼에 대해 읽어보는 시간을 가지며, 칼럼에 대해 익숙해지도록\n함.", "body": "[면접 평가진행하기]\n·자신이 작성한 칼럼에 대해, 칼럼을 작성한 동기, 내용과 근거, 결론, 후속 탐구\n진행에 대한 생각 등을 물어보며 웨일온의 소회의실 기능을 활용하여 면접 평가를\n학생을 돌아가며 진행함."}}], "id": "ch04", "pdf": "pdf/ch04.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(로봇과 공학세계-서산석림중-최준혁1).pdf", "meta": {"curriculum": "2022", "subject": "로봇과 공학세계", "teacher": "최준혁 (서산석림중학교)", "unit": "Ⅰ 로봇의 이해", "code": "[12로봇03-03]", "standard": "로봇공학 프로젝트 수행을 위하여 로봇 제어의 원리를 이해하고, 관련 문제해결을 위한 소프트웨어 알고리즘을 구상한다.", "category": "공학·정보", "school": "서산석림중학교", "teacher_name": "최준혁"}, "stage1": {"total_periods": "6차시", "explanation": "로봇이 센서를 통한 입력, 제어를 통한 처리, 모터·LED 등을 통한 출력의 과정을\n거쳐 동작한다는 로봇 제어의 기본 원리를 이해하고, 해결하고자 하는 문제 상황\n에 맞추어 변수·조건문·반복문 등 알고리즘의 핵심 요소를 활용하여 동작 절차를\n소프트웨어로 구상·구현하도록 설정하였다. 마이크로비트 기반의 간단한 로봇을\n직접 제작·프로그래밍하는 과정에서 문제해결력과 도전 의식을 기르도록 한다.", "know": "로봇 제어의 원리(입력·처리·출력), 알고리즘의 구성 요소(변수·조건문·반복문), 마\n이크로비트의 입출력 부품과 핀 구조", "skill": "문제 상황 분석하기, 제어 알고리즘 구상하기, 회로 구성 및 프로그래밍하기, 동\n작을 점검하고 오류 수정하기", "value": "문제해결에 대한 흥미와 도전 의식, 끈기 있게 수정·개선하는 태도, 생성형 AI 도\n구의 올바른 활용 태도", "eval_goal": "로봇 제어의 원리를 이해하고, 문제해결을 위한 알고리즘을 구상하여 마이크로비\n트 로봇을 제작·구현할 수 있다.", "eval_content": "회로(하드웨어) 구성의 정확성, 필수 알고리즘(변수·조건문·반복문)을 포함한 코드\n의 완성도, 산출물 발표(기획 의도·회로·코드·작동 시연)", "eval_method": "프로젝트, 구술·발표, 포트폴리오 (수행평가 100점 / 학기말 반영비율 50%)"}, "lessons": [{"topic": "로봇 프로젝트의 이해와 해결할 문제 정하기", "concept": "로봇 제어의 원리(입력–처리–출력), 사용자 공감과 문제 정의", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/6", "steps": {"intro": "- 일상생활 속에서 활용되는 로봇 영상을 시청하고, 마이크로비트로 만들 수 있\n는 간단한 로봇 사례(예: 스마트 무드등, 침입 감지 로봇)를 살펴본다.\n- 본 프로젝트의 목표와 수행평가 기준(하드웨어·코딩·발표)을 안내한다.", "body": "- 로봇이 ‘센서 입력 → 마이크로비트 처리 → LED·모터 출력’의 과정을 거쳐 동\n작하는 제어 원리를 이해한다.\n- 학생들은 생활 속 불편함이나 흥미로운 아이디어를 브레인스토밍하여 ‘해결할\n문제’를 정의하고, 계획서 STEP1(로봇 이름, 제작 동기, 핵심 기능)을 작성한다.", "closing": "- 작성한 아이디어를 짝과 공유하고 서로 피드백한다.\n- 다음 차시의 하드웨어·알고리즘 설계 활동을 예고한다."}}, {"topic": "부품·회로 설계와 제어 알고리즘 구상하기", "concept": "입력·출력 부품과 핀 연결, 알고리즘 3요소(변수·조건문·반복문), 스토리보드", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/6", "steps": {"intro": "- 마이크로비트의 주요 입력·출력 부품(충돌 센서, 외부 LED, 서보모터 등)과 핀\n(P0·P1·P2) 구조를 복습한다.", "body": "- 계획서 STEP2를 작성하여 사용할 부품과 역할, 핀 연결 계획을 정한다.\n- 이어 STEP3에서 변수(기억할 값), 조건문(만약 ~라면), 반복문(계속 하기)의 3요\n소를 자신의 로봇 동작에 맞게 설계하고, 동작 순서를 스토리보드로 정리한다.\n- 교사는 순회하며 필수 알고리즘 3요소가 포함되었는지 점검하고 피드백한다.", "closing": "- 회로·알고리즘 설계안을 점검 체크리스트로 스스로 확인하고, 다음 차시의 제\n작·코딩 활동을 준비한다."}}, {"topic": "로봇 제작·프로그래밍 및 시연·발표 〔수행평가〕", "concept": "실습 안전 수칙과 평가 기준(하드웨어 완성도·코드 완성도·발표)을 다시 확인한다.", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "6/6", "steps": {"intro": "- 실습 안전 수칙과 평가 기준(하드웨어 완성도·코드 완성도·발표)을 다시 확인한다.", "body": "- 설계안에 따라 회로를 연결하고 마이크로비트 코드를 작성한 뒤 동작을 테스트\n하고 오류를 수정(디버깅)한다.\n- AI의 도움을 받은 경우 STEP4 ‘AI 활용 일지’에 질문·답변·수정 내용을 기록한다.\n- 완성 후 작동 영상을 촬영하고, 〔수행평가〕로 기획 의도·회로·코드·작동 시연을\n발표한다.", "closing": "- 발표에 대한 상호 피드백을 나누고 STEP5 체크리스트로 자기 평가를 한 뒤, 프\n로젝트 전체 소감을 공유한다."}}], "id": "ch05", "pdf": "pdf/ch05.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(로봇과 공학세계-서산석림중-최준혁2).pdf", "meta": {"curriculum": "2022", "subject": "로봇과 공학세계", "teacher": "최준혁 (서산석림중학교)", "unit": "Ⅱ 공학세계와 로봇의 활용", "code": "[12로봇01-03]", "standard": "로봇의 활용 분야를 이해하고 생활 속 다양한 로봇 활용 분야를 탐구하여 로봇 개발과 활용에 대한 긍정적인 사고를 함양한다.", "category": "공학·정보", "school": "서산석림중학교", "teacher_name": "최준혁"}, "stage1": {"total_periods": "3차시", "explanation": "제조·건설·생명·환경·에너지·수송·정보통신·인공지능 등 다양한 공학 분야에서 로\n봇이 어떻게 활용되는지 사례를 중심으로 탐구하고, 생활 속 로봇 활용이 개인·사\n회·국가에 기여하는 바를 이해하여 로봇 개발과 활용에 대한 긍정적인 사고를 기\n르도록 설정하였다. 조사한 내용을 발표 자료로 구성·발표하는 과정에서 공학 분\n야에 대한 흥미와 진로 탐색의 기회를 갖도록 한다.", "know": "공학 분야별 로봇의 종류와 기능, 로봇에 적용된 핵심 센서·기술, 로봇 활용의 사\n회적·경제적 가치", "skill": "로봇 활용 사례 조사·분석하기, 자료를 시각적으로 구성하기, 발표 자료를 제작하\n고 발표하기", "value": "로봇 개발·활용에 대한 긍정적 사고, 공학 분야 진로에 대한 관심, 생성형 AI 활\n용 시 출처 표기 등 윤리 준수", "eval_goal": "다양한 공학 분야에서의 로봇 활용 사례를 탐구하고, 이를 체계적으로 구성하여\n소개·발표할 수 있다.", "eval_content": "내용 구성(이름/사진·센서/기술·활용 분야·선정 이유), 시각적 완성도(슬라이드 10p\n이상·시각 자료·심미성), 산출물 발표(시간·자연스러움·질의응답)", "eval_method": "프로젝트, 구술·발표, 포트폴리오 (수행평가 100점 / 학기말 반영비율 50%)"}, "lessons": [{"topic": "공학 분야 탐색과 소개할 로봇 선정하기", "concept": "공학의 다양한 분야, 공학 로봇의 선정 기준(센서·제어·구동 시스템)", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "- 다양한 공학 로봇의 영상·사진을 제시하고, ‘공학 로봇’과 단순 완구의 차이가\n무엇인지 발문한다.", "body": "- 제조, 건설·환경, 생명·의료, 에너지·수송, 정보통신·인공지능 등 분야별 로봇 사\n례를 탐색한다.\n- 기획서의 ‘공학 로봇 선정 기준’(센서·제어·구동 장치를 갖춘 시스템)과 인정·제\n외 사례를 확인한 뒤, 관심 분야를 선택하고 소개할 로봇 1개를 선정하여 기획\n서 3항(로봇 이름·핵심 센서/기술·활용 분야·선정 이유) 초안을 작성한다.", "closing": "- 선정한 로봇과 그 이유를 모둠 안에서 공유하고, 평가 기준(내용 구성·시각적\n완성도·발표)을 안내한다."}}, {"topic": "자료 조사와 발표 자료 기획하기", "concept": "신뢰할 수 있는 자료 조사, 슬라이드 구성, 생성형 AI 활용과 출처 표기", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "- 가독성·시각화·구조 측면에서 좋은 발표 자료의 조건을 예시로 비교한다.", "body": "- 선정한 로봇의 핵심 센서·기술, 활용 분야, 선정 이유를 자료 조사로 구체화한다.\n- 기획서 4항에 따라 표지를 포함해 10페이지 이상의 슬라이드 구성을 기획하고,\nAI를 활용할 경우 입력 프롬프트를 우측 칸에 구체적으로 작성한다.\n- 기획서 5항 ‘AI 활용 일지’에 사용 도구·목적·반영 방식을 기록한다.\n- 교사는 출처 표기와 내용 이해 여부를 점검한다.", "closing": "- 슬라이드 구성안을 점검하고 부족한 자료의 보완 계획을 세운다."}}, {"topic": "발표 자료 완성 및 공학 로봇 소개 발표하기", "concept": "발표 태도와 질의응답, 시각적 완성도 점검", "method": "■ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "- 발표 순서와 시간(2분 30초 이상), 평가 요소를 안내한다.", "body": "- 슬라이드를 최종 완성하며 시각 자료와 심미성을 점검한다.\n- 선정한 공학 분야의 로봇을 소개 발표(이름/사진·센서/기술·활용 분야·선정 이유\n포함)\n- 질문에 적절히 답변한다.", "closing": "- 동료 평가와 피드백을 나누고 우수 사례를 공유하며, 공학 분야와 연계한 진로\n소감을 이야기한다."}}], "id": "ch06", "pdf": "pdf/ch06.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(문화콘텐츠산업일반-논산고등학교-박은정).pdf", "meta": {"curriculum": "2022", "subject": "문화콘텐츠 산업일반", "teacher": "박은정 (논산고등학교)", "unit": "Ⅰ. 문화 콘텐츠 산업의 개요와 현황\nⅡ. 문화 콘텐츠 산업 분야별 이해", "code": "[문콘 01-03-01] ~\n[문콘 01-03-03],\n[문콘 01-04-01] ~\n[문콘 01-04-02]", "standard": "[문콘 01-03-01] 문화 산업에 대하여 알아보고, 다양한 문화 콘텐츠의 개발 및 문화 산업의 분류에 대하여 설명할 수 있다. [문콘 01-03-02] 4차 산업 혁명 이후 우리나라와 세계 문화 산업의 현황에 대하여 설명할 수 있다. [문콘 01-03-03] 우리나라와 세계 문화 산업에 대하여 분석하고, 향후 문화 산업의 전망에 대하여 설명할 수 있다. [문콘 01-04-01] 4차 산업 혁명에 따른 문화 산업 정책에 대하여 알아보고, 다양한 문화 산업 정책에 관해 설명할 수 있다. [문콘 01-04-02] 우리나라와 세계 문화 산업에 정책을 분석하고, 문화 산업에 미치는 영향에 대하여 설명할 수 있다.", "category": "직업·실무", "school": "논산고등학교", "teacher_name": "박은정"}, "stage1": {"total_periods": "6차시", "explanation": "[문콘01-03] 문화 산업에 대하여 알아보고, 다양한 문화 콘텐츠의 개발 및 문화 산\n업의 분류를 이해하며, 4차 산업 혁명 이후 우리나라와 세계 문화 산업의 현황을\n조사하고, 이를 분석한 자료를 토대로 향후 문화 산업의 전망을 논리적으로 설명할 수 있다.\n[문콘01-04] 4차 산업 혁명에 따른 문화 산업 정책을 알아보고 다양한 정책을 제시\n하며, 우리나라와 세계 문화 산업 정책을 체계적으로 분석하여 문화 산업에 미치는\n영향을 논리적으로 설명할 수 있다.", "know": "· 문화 콘텐츠의 개발 및 문화 산업의 분류 체계\n· 4차 산업 혁명 이후 우리나라와 세계 문화 산업의 현황과 전망\n· 4차 산업 혁명에 따른 문화 산업 정책의 개념·유형", "skill": "· 우리나라와 세계 문화 산업의 현황을 조사·발표하기\n· 우리나라와 세계 문화 산업을 비교·분석하여 전망 추론하기\n· 문화 산업 정책을 조사하고 산업에 미치는 영향을 토론하기", "value": "· 자료의 출처·최신성을 따지는 비판적·정직한 탐구 태도(지식정보처리 역량)\n· 산업 변화를 자신의 진로·삶과 연결하려는 능동적 관심\n· 산업·정책을 다각도로 바라보는 창의적·심미적 안목", "eval_goal": "선택한 문화 콘텐츠 산업 분야의 분류·현황을 자료에 근거해 분석하고, 향후 전망과\n정책 대안을 논리적으로 도출하여 설득력 있게 표현·발표할 수 있는지를 평가한다.", "eval_content": "① 산업 분류 및 국내외 현황 분석(통계·사례 근거 제시)\n② 기술적·사회인구학적 요인에 근거 n· 발표 자료·대본을 다음 차시 전까지 완성"}}, {"topic": "콘텐츠 발표·저작권 점검— \"나의 콘텐츠 데뷔의 날\"", "concept": "· 발표·전달력· 저작권 윤리· 상호 평가와 자기 성찰", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 ■ 기타( 에듀테크 활용 )", "period": "6/6", "steps": {"intro": "[학습 목표 안내] · 저작권을 점검하며 콘텐츠를 발표하고, 동료 평가와 자기 성찰을\n통해 학습을 마무리할 수 있다.\n[저작권 점검— 온라인 보드\"저작권 퀴즈\"]\n[온라인 보드] 저작권 퀴즈로 출처 표기·이용 범위를 최종 점검(교과서Ⅳ-02)", "body": "[온라인 보드 \"문화 콘텐츠 제작 발표\" 섹션] 모든 학생의 콘텐츠(산출물·시연 영상)를\n보드에 업로드→ 갤러리 워크로 동시 관람\n[발표(각3~4분)] · 발표 흐름: 기획 의도·타깃→ 차별화→ 콘텐츠 시연→ 제작 중\n문제와 해결→ 홍보 전략\n· 산출물을 직접 시연(게임 플레이·영상 재생 등)하며 핵심 전달\n[질의응답·상호 평가— 온라인 보드] \"이 콘텐츠의 차별점은?\", \"홍보가 타깃에 통할까?\"\n동료 질문, 1인당 3편 이상 평가 댓글", "closing": "[정리 및 성찰— 온라인 보드] 우수작 좋아요 집계, 자기 성찰(가장 어려웠던 점/해\n결법/진로 연결) 게시\n· 단원 총평: \"좋은 콘텐츠는 기획·제작·홍보가 하나로 연결될 때 완성된다\""}}], "id": "ch07", "pdf": "pdf/ch07.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(보건-우성초등학교-김진아).pdf", "meta": {"curriculum": "2022", "subject": "보건", "teacher": "김진아 (공주우성초등학교)", "unit": "Ⅰ-2. 질병 예방과 건강 생활 기술", "code": "12보건01-05", "standard": "개인·공동체의 질병 예방과 건강 관리에 건강 생활 기술과 건강 관리 모델을 적용하여 평가하고, 국가적·국제적 수준의 건강 문제와 이에 대한 건강 옹호 방안을 탐색한다.", "category": "보건·의료", "school": "공주우성초등학교", "teacher_name": "김진아"}, "stage1": {"total_periods": "11차시", "explanation": "생애주기별 건강 특성을 생체리듬과 관련하여 이해하고 개인과 가족 및 지역\n사회의 건강관리에 긍정적인 영향을 미치도록 한다.", "know": "∙ 개인과 공동체, 국가의 질병예방과 건강관리\n∙ 건강생활기술과 건강자원\n∙ 개인⋅공동체⋅국가의 건강옹호와 협력 및 네트워크", "skill": "∙ 건강관리하기\n∙ 네트워크 활용 및 건강옹호하기", "value": "∙ 건강 가치화와 건강관리 및 건강증진 실천 의지\n∙ 건강지향적 환경 개선 의지\n∙ 소통과 협력하며 반성과 개선 인식\n∙ 건강관리의 생활화", "eval_goal": "개인 및 공동체의 건강 문제를 인식하고, 건강 생활 기술과 모델을 적용하여\n실측 가능한 건강 옹호 방안을 수립할 수 있는지 평가한다.\n또한 디지털 도구를 활용해 건강 정보를 시각화하고 온·오프라인 캠페인을 통해\n건강한 공동체 만들기에 참여하는 역량을 종합적으로 평가한다.", "eval_content": "∙ 캠페인 구상(40%): 생애주기별 건강 이슈(구강 건강, 영양, 신체 활동 등)\n선정 및 구체적인 옹호 방안 기획\n∙ 캠페인 개발(40%): 디지털 도구(캔바 등)를 활용한 카드뉴스, PPT 등 캠페인\n홍보 콘텐츠 제작\n∙ 캠페인 홍보 및 참여(20%): 결과물 발표, 온라인 홍보 활동 및 실시간 질의\n응답 참여도", "eval_method": "∙ 수행평가 100%: 프로젝트 과정(활동지, 기록지)과 최종 산출물(카드뉴스,\nPPT)을 종합적으로 평가한다.\n∙ 관찰 평가: 실시간 화상 수업 중 발표 및 토론, 협력적 문제 해결 과정을\n관찰하여 평가한다.\n∙ 자기·동료 평가: 캠페인 기획 및 제작 과정에 대한 자기 성찰과 모둠원 간\n상호 평가를 실시한다.\n∙ 성적 산출: 본 과목은 P/F(Pass/Fail) 방식으로 운영되며, 출석률과 참여율을\n핵심 지표로 활용한다."}, "lessons": [{"topic": "건강 옹호 캠페인 구상 (수행평가 1)\n- “우리의 건강 이슈 찾기”", "concept": "개인적·사회적 건강 지표, 생애주기별 건강 이슈, 건강 옹호 전략", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "4/11", "steps": {"intro": "[동기유발]\n∙ 현재 자신의 건강 상태를 건강 지표를 통해 측정하고, 개인적⋅사회적 건강 상태\n평가해보기\n∙ “우리가 주변의 건강 문제를 해결하는 건강 옹호자가 된다면 어떤 변화를 만들\n수 있을까?” 질문 던지기", "body": "[학습 목표 안내]\n∙ 생애주기별 주요 건강 이슈를 분석하고, 과학적 근거에 기반한 건강 옹호 캠페인을\n기획할 수 있다.\n[건강 이슈 탐색]\n∙ 생애주기별 분석: 영유아, 청소년, 성인, 노년 등 각 시기별로 발생하는 주요 질환\n및 건강 관리 필요성 조사하기\n- 교과서 관련 단원, 도표, 이미지를 우선 탐색하도록 제시한다.\n- ‘카카오파스타 건강 헬스 메거진’ 홈페이지를 방문하여 생애주기별 관심도가\n높은 게시글의 내용과 특성을 분석하도록 안내한다.\n[건강 옹호 캠페인 기획]\n∙ 건강 옹호 캠페인 주제 선정 및 옹호 방안 수립의 개요를 작성한다.", "closing": "[정리 및 다음 차시 예고]\n∙ 개별적으로 캠페인 기획의 개요를 발표하며 동료 및 교사의 피드백을 주고\n받는 시간을 가진다.\n∙ 디지털 도구를 활용한 건강 옹호 콘텐츠(카드뉴스, PPT 등) 제작 방법을 안내한다."}}, {"topic": "건강 옹호 캠페인 구상 (수행평가 2)\n- “디지털 건강 옹호 콘텐츠 제작”", "concept": "건강 생활 기술 적용, 정보의 시각화, 디지털 리터러시", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 ■ 거꾸로학습 ■ 블랜디드 러닝 □ 기타( )", "period": "7/11", "steps": {"intro": "[탐구 목표 확인]\n∙ 건강 옹호 메시지의 신뢰성을 높이기 위한 자료 수집의 기준, 주의점 제시\n- 출처, 주장에 대한 과학적 근거 등 뒷받침 자료의 존재 유무 등, 생성형 AI\n답변 내용 진위 확인 과정 거치기 등\n∙ “우리가 주변의 건강 문제를 해결하는 건강 옹호자가 된다면 어떤 변화를 만들\n수 있을가?” 질문 던지기", "body": "[콘텐츠 제작(디지털 도구 활용)]\n∙ 정보 시각화: 캔바, 미리캔버스 등을 활용하여 건강 정보를 효과적으로 전달할 수\n있는 레이아웃 설계하기\n- 생성형 AI 활용 또는 조사 자료 복제 방지를 위해 양식은 별도 제공하지 않으며,\n학생들의 창작물로 수행평가가 진행됨을 안내하기\n- 건강 옹호 활동에서 가장 중요한 요소는 ‘전달력’ 이며, 같은 정보도 ‘전달력’에\n따라 교육 대상자의 교육 효과가 달라질 수 있음을 설명하며 콘텐츠 제작에 대한\n참여 의의를 강조하기\n[분야별 콘텐츠 개발]\n∙ 생애주기별 맞춤형 건강 정보를 바탕으로 카드뉴스, 발표 자료 등을 제작하기\n- (예시) 구강 건강 - 치위생, 영양 관리 - 간호사, 신체 활동 - 물리치료사 등\n자신의 희망 진로 또는 관심 분야와 관련된 주제를 선정할 수 있도록 안내하기", "closing": "[정리 및 다음 차시 예고]\n∙ 제작 중인 콘텐츠의 시각적 전달력과 메시지의 명확성을 점검하고 보완하기\n∙ 최종 홍보를 위한 발표 자료 동료, 자기, 교사 평가"}}, {"topic": "캠페인 결과물 발표, 홍보 및 성찰 (수행평가 3)\n- “함께 만드는 건강한 미래”", "concept": "건강 옹호 참여 및 소통, 협력적 문제 해결, 자기 성찰", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 ■ 거꾸로학습 ■ 블랜디드 러닝 □ 기타( )", "period": "11/11", "steps": {"intro": "[동기 유발]\n∙ 실시간 화상 수업 환경에서 제작물을 공유하고 ‘건강 옹호가’로서 소통할 수 있는\n분위기 조성하기\n- 화상 수업 환경에서 ‘발표 독려’ 또는 ‘과제 점검’ 등의 역할을 부여받은 학생이\n발표 환경을 조성하고 주도할 수 있도록 독려하기\n[탐구 목표 확인]\n∙ “우리가 주변의 건강 문제를 해결하는 건강 옹호자가 되어 어떤 정보를 전달할\n수 있을까?” 질문 던지기", "body": "[캠페인 발표]\n∙ 결과물 공유: 제작한 콘텐츠를 발표하고 동료(학우)들의 질문에 답변하며 건강 지식\n확산하기\n[상호 평가]\n∙ ‘교과서와 연계된 내용’, ‘교과서 내용에 덧붙여 심층 조사한 내용’, ‘인상 깊은\n내용’, ‘전달력(발표 및 자료의 가독성 등)’ 등의 평가요소를 사전 안내하며 동료\n평가할 수 있도록 안내하기", "closing": "[정리 및 성찰]\n∙ 프로젝트 과정을 통해 배운 점을 서술하고, 일상 속에서 건강 옹호 활동의 실천\n다짐하기\n∙ 건강한 공동체 만들기에 참여하는 시민 역량 중요성 강조"}}], "id": "ch08", "pdf": "pdf/ch08.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(생태와환경-천안봉서중학교-이규행).pdf", "meta": {"curriculum": "2022", "subject": "지구과학", "teacher": "이규행 (천안봉서중학교)", "unit": "환경 문제와 쟁점", "code": "[12생환03-03]", "standard": "자원과 에너지, 폐기물 등과 관련된 국내외 환경 문제와 쟁점을 시차성 및 유한성 등과 관련지어 데이터를 기반으로 심층 탐구하고, 개인 및 사회 차원의 합리적 의 사 결정에 적용한다.", "category": "과학·수학", "school": "천안봉서중학교", "teacher_name": "이규행"}, "stage1": {"total_periods": "5", "explanation": "자원 및 에너지, 폐기물 등과 관련된 환경 문제와 쟁점의 발생, 영향, 해결 과정에\n서 상당한 시차가 생길 수 있음을 알고(시차성), 사전 예방의 원칙을 사례를 통해\n심층적으로 탐구하도록 한다. 화석 연료 기반의 자원 및 에너지 사용에 한계가 있\n음(유한성)을 이해하고, 데이터 조사와 분석 등을 통해 에너지원과 시스템의 전환\n방안을 심층적으로 탐구하며 개인과 사회 차원에서 합리적으로 의사 결정을 할 수\n있는 대안을 제시하도록 한다.", "know": "⋅환경 문제 예방 ⋅데이터 분석을 통한 심층 탐구 ⋅환경 문제의 시차성, 유한성", "skill": "⋅환경 관련 데이터를 조사·수집·분석하기\n⋅디지털 도구를 활용하여 자료를 시각화하고 해석하기\n⋅데이터 간 상관관계를 분석하고 결과를 추론하기\n⋅AI 기반 예측 결과를 비판적으로 해석하기\n⋅피지컬 컴퓨팅 도구를 활용하여 환경 정보를 측정하고 문제 해결 방안을 구현하기\n⋅환경 문제 해결 사례를 분석하고 실천 방안을 의사소통하기", "value": "⋅환경 문제에 대한 책임감과 공동체 의식\n⋅지속 가능한 사회 실현을 위한 실천 의지\n⋅데이터 기반 의사 결정의 중요성 인식\n⋅환경 문제 해결 과정에 대한 적극적 참여 태도\n⋅과학 기술과 디지털 도구를 활용한 문제 해결 태도\n⋅타인의 의견을 존중하며 협력적으로 의사소통하는 태도", "eval_goal": "지역 환경 문제를 실제 데이터에 기반하여 탐구하고, 데이터 분석 결과와 환경 문\n제의 시차성에 대한 이해를 바탕으로 합리적인 해결 방안을 도출하며, 개인 및 사\n회 차원의 실천 방안을 제안할 수 있다.", "eval_content": "⋅실제 환경 데이터의 하기\n⋅환경 문제 예방의 중요성과 사전 예방 원칙 이해하기\n⋅단기적 관점과 장기적 관점의 의사결정 비교하기\n[실천 방안 제안하기]\n⋅1~4차시에서 탐구한 지역 및 학교 환경 문제를 다시 살펴보기\n⋅개인 차원, 학교 차원, 지역사회 차원의 실천 방안 구분하기\n⋅실천 가능성, 효과성, 지속가능성을 고려하여 우선순위 정하기\n⋅모둠별 실천 계획서 작성하기\n- 환경 실천 제안서, 환경 행동 선언문, 환경 경보기 설명서 등"}}], "id": "ch09", "pdf": "pdf/ch09.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(세포와물질대사-충남관광보건고-장인영).pdf", "meta": {"curriculum": "2022", "subject": "세포와물질대사", "teacher": "장인영 (충남관광보건고등학교)", "unit": "Ⅰ세포 – 02. 세포의 구조와 기능", "code": "12세포01-03", "standard": "[12세포01-03] 동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 이해하고, 세포 소기관들의 유기적 관계를 추론하여 협력적으로 소통할 수 있다.", "category": "과학·수학", "school": "충남관광보건고등학교", "teacher_name": "장인영"}, "stage1": {"total_periods": "3차시", "explanation": "[12세포01-03] 세포 소기관의 구조와 기능은 전자현미경을 포함한 다양한 현미경의\n이용, 세포 분획법, 자기 방사법 등의 방법으로 알아낼 수 있음을 이해하도록 하고,\n세포 소기관의 유기적 관계는 물질의 합성과 분비를 중심으로 다루도록 한다.", "know": "• 세포의 연구 방법\n• 세포 소기관의 구조\n• 세포 소기관의 기능\n• 동물세포와 식물세포의 공통점과 차이점", "skill": "• 세포 소기관의 기능 설명하기\n• 동물세포와 식물세포를 관찰하고 비교하기\n• 모둠 토의 및 프로젝트를 통해 의견 공유 및 소통하기\n• 다양한 자료를 활용하여 세포의 구조를 표현하고 설명하기", "value": "• 생명의 기본 단위인 세포를 학습하고자 하는 태도\n• 생명체의 복잡성과 정교함에 대한 호기심과 탐구 의지\n• 과학적 근거를 바탕으로 자신의 생각을 표현하는 자세\n• 모둠 활동에서 타인의 의견을 존중하며 협력적으로 소통하는 태도", "eval_goal": "• 세포의 연구 방법과 세포 소기관의 구조와 기능을 이해 및 설명하며, 모둠 활동을\n통해 협력적으로 소통할 수 있는지를 평가한다.", "eval_content": "• 세포의 연구 방법 설명하기\n• 세포 소기관의 구조와 기능 설명하기\n• 동물세포와 식물세포의 공통점과 차이점 설명하기\n• 모둠 활동 시 자신의 의견을 제시하고 타인의 의견을 존중하며 협력적으로 소통하기", "eval_method": "• 수행평가 : 설명 자료(인포그래픽) 제작 자료\n• 발표평가 : 설명 자료(인포그래픽) 발표\n• 자기 및 동료평가 : 협력 과정 및 의사소통 태도 평가"}, "lessons": [{"topic": "세포, 넌 누구니?", "concept": "세포의 연구 방법, 동물세포의 세포 소기관, 식물세포의 세포 소기관", "method": "■ 협동학습 □ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[공감하기]\n▸세포 관련 영상 시청 (두 가지 영상 중 하나 선택)\n(1) 세포설의 기묘한 역사\n-영상 길이: 6분 12초\n-자막: 한국어 자막, 한국어 오디오(더빙) 가능\n-링크: https://www.youtube.com/watch?v=URUJD5NEXC8\n(2) 세포 속으로의 여행\n-영상 길이: 1분 13초\n-자막: 영어 자막만 가능\n-링크: https://www.youtube.com/watch?v=URUJD5NEXC8\n[생각열기]\n▸활동 예고: “과학자들의 오랜 연구를 통해, 오늘날 세포는 생물체를 구성하는 구조적\n단위이자 생명 활동을 수행하는 기능적 단위임을 말하고 있습니다. 따라서 세포의\n연구는 생명체의 다양한 생명 현상을 이해하는 기본이 되므로, 우리는 세 번의 시간을\n걸쳐 세포 전문가가 되고자 합니다.”", "body": "[학습 목표 안내]\n-세포의 연구 방법에 대해 설명할 수 있다.\n-동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 설명할 수 있다.\n[프로젝트 안내]\n▸모둠 구성 (2인 1조 가정, 주제를 세분화하여 1인 1조도 가능)\n-1조: 세포의 연구 방법 – 현미경의 종류와 사용 방법"}}, {"topic": "세포, 내가 자세히 알려준다!", "concept": "세포의 연구 방법, 동물세포의 세포 소기관, 식물세포의 세포 소기관", "method": "■ 협동학습 □ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[생각열기]\n▸1차시 내용 언급, 마무리 및 발표 준비 안내", "body": "[학습 목표 안내]\n-세포의 연구 방법에 대해 설명할 수 있다.\n-동물세포와 식물세포를 구성하는 세포 소기관의 구조와 기능을 설명할 수 있다.\n[프로젝트 진행 및 마무리]\n▸한 장 분량 설명 자료(인포그래픽) 제작 마무리\n▸제작한 설명 자료(인포그래픽)를 마주온 퀴즈앤 보드 등과 같은 공유 플랫폼에 게시\n-주의: 웨일온 계정으로 로그인해야 교사 유료 계정 사용 가능\n[발표 및 경청]\n▸조마다 5분씩 발표\n-설명뿐만 아니라 경청의 자세도 중요함을 안내\n-교사가 제시하는 학습지 채우기 또는 백지에 발표 내용 필기 및 정리\n▸자기평가지 및 동료평가지 작성"}}, {"topic": "세포, 이제 내가 전문가!", "concept": "세포의 연구 방법, 동물세포의 세포 소기관, 식물세포의 세포 소기관", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[공감하기]\n▸세포 관련 영상 시청\n생물학: 세포 구조\n-영상 길이: 7분 21초\n-자막: 한국어 자막, 한국어 오디오(더빙) 가능\n-링크: https://www.youtube.com/watch?v=URUJD5NEXC8\n[생각열기]\n▸2차시 설명 자료(인포그래픽)를 학생들에게 제시 및 교사의 간단한 설명\n▸활동 예고: “동물세포와 식물세포는 진핵세포에 속하며, 세포는 원핵세포와 진핵세포로\n나뉩니다. 오늘은 세포를 나누는 기준을 알아봅시다.”", "body": "[학습 목표 안내]\n-원핵세포와 진핵세포의 구조를 비교할 수 있다.\n[학습 내용 안내]\n▸원핵세포의 정의를 듣고, 직접 상상하여 활동지에 그림을 그린 후 마주온 퀴즈앤\n보드 등과 같은 공유 플랫폼에 게시\n-상상해서 그림을 그리는 것이므로 정답은 없음을 안내\n▸교사가 ①유전물질, ②핵막, ③세포막, ④세포벽, ⑤라이보솜, ⑥막성 세포소기관\n단어를 언급하면, 학생들은 원핵세포와 진핵세포를 비교하여 토의•토론하기\n-부담 없이 자유롭게 본인의 생각을 밝힐 수 있도록 편안한 분위기 조성\n-필요시 마주온 퀴즈앤 보드 등 공유 플랫폼 활용\n▸교사와 함께 원핵세포, 진핵세포의 바른 과학 개념 정립 및 학습지 채우기", "closing": "[정리 및 다음 차시 예고]\n▸마주온 퀴즈앤 퀴즈쇼 기능을 통해 세포 관련 학생 이해 여부 확인\n▸세포막을 통한 물질의 이동에 관해 배울 것임을 안내"}}], "id": "ch10", "pdf": "pdf/ch10.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(스포츠개론-서산중앙고등학교-정혜민).pdf", "meta": {"curriculum": "2022", "subject": "스포츠개론", "teacher": "정혜민 (서산중앙고등학교)", "unit": "Ⅱ. 스포츠와 학문\n01. 스포츠와 사회과학적 연구", "code": "[12스개02-01]", "standard": "스포츠에 대한 사회과학적 탐구 내용과 방법을 이해하고 사례에 적용하여 분석하며 사회과학적 연구 태도를 실천한다.", "category": "예술·체육", "school": "서산중앙고등학교", "teacher_name": "정혜민"}, "stage1": {"total_periods": "4차시", "explanation": "스포츠 현상에 내재한 다양한 사회·문화적 가치를 파악하기 위해 사회과학적 연구\n방법을 체계적으로 이해한다. 현대 스포츠 문화의 형성 요인을 구체적인 사례를 통\n해 다각도로 분석하고, 그 과정에서 나타나는 긍정적·부정적 영향력을 비판적으로\n고찰하여 스포츠 문화의 발전적 방향과 실천적 해결 방안을 창의적으로 제시하는\n활동을 강조한다.", "know": "·스포츠 현상을 바라보는 사회과학적 관점 및 탐구 방법론 이해\n·현대 스포츠 문화에 영향을 미치는 다각적 요인 분석\n·스포츠가 사회에 미치는 긍정적·부정적 영향과 갈등 요인에 대한 구조적 이해", "skill": "·스포츠 현상(문화)에 사회과학적 이론과 탐구 방법을 적용하여 원인-결과 체계적\n분석\n·분석 결과를 바탕으로 스포츠 문화의 문제점을 진단하고, 현실적·구체적인 개선\n방안 및 미래 발전 방향 도출하기\n·자료 수집·정리 과정에서 신뢰성 있는 근거를 확보하고, 발표를 통해 청중과 비판\n적·협력적 상호작용하기", "value": "·스포츠 현상을 객관적·과학적으로 고찰하는 태도의 중요성을 인식하고 즐거운 탐\n구 정신 실천하기\n·스포츠 문화의 한계를 인식하고, 사회 구성원으로서 더 나은 스포츠 문화를 만들\n기 위한 책임감과 윤리적 태도 견지하기\n·다양한 사회적 관점을 포용하고, 토론과 발표 과정에서 동료의 의견을 존중하는\n민주적 시민의식 발휘하기", "eval_goal": "스포츠 문화 형성 요인을 사회과학적 방법으로 심층 탐구하고, 그 결과를 논리적으\n로 분석하여 스포츠의 미래 발전과 개선 방안을 창의적으로 제시하고 발표할 수\n있다.", "eval_content": "① 탐구 설계 및 자료 조사\n② 내용 분석 및 논리성\n③ 해결 방안 및 확장 사고\n④ 말하기 및 의사소통 태도", "eval_method": "·수행평가(활동 결과물 종합평가)\n·발표 평가"}, "lessons": [{"topic": "스포츠 현상 사회학적 탐구-통계로 보는 스포츠 사회", "concept": "· 스포츠 사회학의 핵심 개념 · 스포츠 사회학의 이해 ·스포츠의 사회적 흐름 담론\n이해", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/4", "steps": {"intro": "[생각 열기]\n§ “감정은 스포츠를 이해하게 하지만, 통계는 스포츠 사회를 설명하게 한다” 발문\n§ 스포츠 현상을 단순한 유희가 아닌 사회과학적으로 연구해야 하는 이유와 필요\n성 제시\n§ 스포츠 부정적 일탈(폭력, 도핑 등)에 관한 사례를 제시하며 사회문화적 요인과\n연결하여 간단하게 제시", "body": "[학습 목표 안내]\n§ 스포츠의 사회과학적 연구 동향과 현상을 이해하고 스포츠 사회학 담론을 파악\n할 수 있다.\n[스포츠 사회학에 대해 알아보기]\n§ 스포츠 사회학에서 다루는 주요 주제와 연구 사례 제시\n§ 스포츠 사회학 연구의 필요성과 양적·질적연구 차이점 교육(사례 중심)\n[RISS를 활용한 스포츠 사회학 연구 동향 파악하기]- 활동지①\n§ 스포츠 사회학적 키워드 선정하여 관련 연구 동향 살펴보기\n§ 연구들을 살펴보며 스포츠 사회학 연구의 필요성 의견 나눔\n[빅카인즈를 활용한 스포츠 사회적 담론 분석하기 활동]- 활동지①\n§ 스포츠 사회학적 흐름 담론 파악할 수 있는 통계 기법 설명\n§ 빅카인즈 사이트 활용: 자신의 키워드 관련 뉴스 중 어 향 요인 심층 탐구 및 발표 활동", "concept": "· 스포츠 문화 영향 요인 분석 · 스포츠 문화 구조 분석 ·비판적 사고 ·스포츠의 사\n회·윤리적 관점 탐구 ·발표·표현력", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타(발표활동)", "period": "4/4", "steps": {"intro": "[‘스포츠와 문화’ 콜로키움 분위기 조성]\n§ 심층 탐구 작성 및 결과에 따른 발표를 실시하여 심도있는 활동 분위기 조성\n§ 탐구 작성 및 발표 순서(기준) 안내", "body": "[학습 목표 안내]\n§ 스포츠 문화의 영향 요인을 파악하고 이를 개선할 수 있는 실천적 아이디어를\n제시할 수 있다.\n§ 스포츠 문화의 문제점을 우리 사회 전제의 사회적, 윤리적 관점에서의 시사점을\n제시할 수 있다.\n[심층 탐구 및 발표]- 활동지④\n§ 전차시에서 학생 개인이 선택한 스포츠 문화의 구조적 요인, 긍정적·부정적 영향\n분석\n§ 단순한 스포츠계 내부 문제를 넘어 우리 사회 전체의 사회적 관점과 윤리적 관\n점에서 바라본 시사점 등 제시\n§ 탐구 발표 실시 및 동료 학생들과의 질의응답을 통한 비판적 확장 토론 진행", "closing": "[정리 및 성찰]\n§ 스포츠 문화별 영향 요인 등 의견 나눔\n§ 스포츠 사회학 수업 정리 및 질의응답\n§ 타 과목과의 스포츠 사회학 융합 가능성 안내"}}], "id": "ch11", "pdf": "pdf/ch11.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(인간과심리-충남온라인학교-강서현).pdf", "meta": {"curriculum": "2022", "subject": "인간과 심리", "teacher": "강서현 (충남온라인학교)", "unit": "Ⅰ. 마음의 과학적 탐구", "code": "12심리01-03", "standard": "심리학 내 다양한 하위 분야가 실생활과 관련되거나 사회 발전에 기여한 사례를 탐색하고 자신의 진로 탐색과 연결한다.", "category": "인문·사회", "school": "충남온라인학교", "teacher_name": "강서현"}, "stage1": {"total_periods": "3차시", "explanation": "심리학이 인간의 마음과 행동을 다루는 학문으로서 우리 삶에 어떻게 적용되는지\n이해하도록 돕는다. 심리학의 다양한 하위 분야(임상, 상담, 인지, 발달, 사회, 범죄\n심리학 등)가 실생활의 문제를 해결하고 사회 발전에 기여한 구체적 사례를 탐색한\n다. 이를 바탕으로 학생 개개인의 관심사 및 진로 방향과 심리학적 탐구 주제를 능\n동적으로 연결한다. 나아가 생성형 AI 도구를 비판적으로 활용해 학습 내용을 문학\n적·시각적 매체(시와 시화)로 재구성하고 공유하는 탐구·성찰 활동을 통해 창의적\n융합 소양을 함양하는 것을 목표로 한다.", "know": "Ÿ 심리학의 주요 연구 방법 및 기초·응용 심리학의 다양한 하위 분야\nŸ 심리학 이론이 실생활의 오류 인지 및 문제 해결에 기여하는 방식\nŸ 자신의 진로 및 관심 분야와 심리학의 접점", "skill": "Ÿ 심리학 하위 분야 및 이론을 실생활 사례와 비교·대조하기\nŸ 자신의 진로 관심사에 맞는 심리학 주제를 선정하고 사례 기반 탐구·발표하기\nŸ 학습한 심리학적 지식을 성찰하여 시와 시화 등의 창의적 산물로 표현하기", "value": "Ÿ 인간의 마음과 행동을 과학적·객관적으로 이해하려는 태도\nŸ 심리학의 실용적 가치를 인식하고 실생활 및 사회 문제 해결에 기여하려는 개\n방적 태도\nŸ 자기 성찰을 통한 깊이 있는 진로 탐색의 자세", "eval_goal": "심리학의 다양한 하위 분야가 실생활 및 사회 발전에 기여한 사례를 명확히 이해\n하고, 자신의 진로와 연계하여 다양한 관점에서 깊이 있게 분석·탐구할 수 있는지\n를 평가한다.", "eval_content": "① 선택한 탐구 주제의 적절성\n② 정보의 신뢰성과 정확성\n③ 말하기 및 의사소통 태도\n④ 창의성 및 개인적 성찰\n※ 1차시 이론 매칭 활동과 3차시 AI 활용 시화전 활동은 수업 내 학습 역량 강화\n및 복습 활동으로 운영하며, 본 평가 점수에는 산입하지 않고 과정 중심 피드백 및\n생활기록부 기재 요소로만 연계함.", "eval_method": "'심리학 주제탐구 발표' 채점 기준 루브릭을 적용한 교사 실시간 관찰 및 정량·정\n성 평가 실시."}, "lessons": [{"topic": "심리학의 연구 방법과 다양한 하위 분야 탐색", "concept": "· 심리학의 연구 방법 · 심리학의 하위 분야 · 진로 탐색", "method": "□ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[생각 열기]\n· ‘심리학은 우리 사회에 어떤 도움을 주고 있을까?’ 질문 제시\n· 일상생활 속 심리학 사례(광고, 학습, 상담, 범죄 예방 등)를 제시하여 심리학의\n활용 분야에 대한 관심 유도\n[학습 목표 안내]\n· 심리학의 다양한 하위 분야를 이해할 수 있다.\n· 심리학이 사회 발전에 기여한 사례를 탐색할 수 있다.\n· 자신의 진로 및 관심 분야와 관련된 심리학 주제를 탐색할 수 있다.", "body": "[심리학 하위 분야 탐색]\n· 기초 심리학과 응용 심리학의 다양한 하위 분야 살펴보기\n· 관심 있는 심리학 분야를 선택하여 관련 직업 및 실생활 활용 영역 조사하기\n· 활동지 작성 후 결과 공유하기\n[심리학의 사회적 기여 사례 분석]\n· 심리학 연구가 사회 발전에 기여한 사례 읽기\n- 고령 운전자의 교통안전 연구에 적용된 심리학의 사례\n- 자폐 스펙트럼 장애 인식 개선 사례\n· 사례별 관련 심리학 분야를 추론하고 사회적 기여 내용 정리하기\n[사회 문제와 심리학 연결하기]\n· 고령화, 학교폭력, 지역 소멸 등 우리나라의 다양한 사회 문제 탐색하기\n· 관심 있는 사회 문제를 선택하고 선정 이유를 작성한 뒤 해당 문제 해결에 기여\n할 수 있는 심리학 분야 탐색하기\n학생 활동 예시 1 학생 활동 예시 2\n· 이후 주제탐구 발표를 위한 관심 주제 구상하기", "closing": "· 탐색한 심리학 하위 분야 중 자신의 진로 및 관심사와 연결된 발표 주제를 최종\n확정하도록 안내"}}, {"topic": "진로와 연계한 심리학 주제탐구 발표", "concept": "· 심리학 주제탐구 · 정보 분석 및 활용 · 의사소통과 발표", "method": "□ 협동학습 ■ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[발표 준비 및 학습 목표 안내]\n· 수행평가의 목적과 발표 절차 안내\n· 발표 평가 요소(주제 적절성, 내용의 정확성, 진로 연계성, 발표 태도) 안내\n· 동료 발표를 경청하며 피드백을 작성할 것을 안내\n[탐구 주제 공유]\n· 학생들이 선정한 심리학 탐구 주제를 간단히 소개\n· 다양한 심리학 분야가 진로 및 사회 문제와 어떻게 연결되는지 생각해 보기", "body": "[심리학 주제탐구 발표]\n· 학생들이 탐구한 심리학 분야 및 관련 주제를 발표하고 탐구 결과를 공유하기\n· 심리학 개념을 진로 및 관심 분야와 연계하여 설명하기\n학생 활동 예시 1 학생 활동 예시 2\n[패들렛 활용 상호 피드백]\n· 동료의 발표를 경청하며 인상 깊은 점, 새롭게 알게 된 점, 궁금한 점 기록하기\n· 다양한 심리학 분야의 가치와 활용 가능성 공유하기", "closing": "[탐구 결과 성찰]\n· 발표를 통해 알게 된 심리학 분야 및 사회적 활용 사례 정리\n· 심리학이 다양한 진로 분야와 연결될 수 있음을 이해하기\n[다음 차시 예고]\n· 학습한 심리학 개념을 활용한 시 창작 및 시화 제작 활동 안내"}}, {"topic": "심리학 개념을 활용한 온라인 시화전 개최", "concept": "· 심리학 개념의 재구성 · 창의적 표현 · 자기 성찰", "method": "□ 협동학습 □ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[학습 내용 돌아보기]\n· 수업 중 학습한 심리학 개념 및 탐구 주제 되돌아보기\n[학습 목표 안내]\n· 생성형 AI 및 디지털 도구를 활용하여 학습 경험을 시화로 표현할 수 있다.\n· 작품 공유를 통해 자신의 성장과 배움을 성찰할 수 있다.", "body": "[심리학 학습 경험 성찰하기]\n· 인간과 심리 수업을 통해 새롭게 알게 된 점, 흥미를 느낀 분야, 변화한 생각 등\n정리하기\n[시 창작 및 시화 제작]\n· 심리학 개념과 학습 경험을 바탕으로 시 작성하기\n· 생성형 AI 및 디지털 도구를 활용하여 시의 의미와 분위기를 시각적으로 표현하\n고 시와 이미지를 결합하여 시화 작품 완성하기\n학생 활동 예시 1 학생 활동 예시 2\n[온라인 시화전 운영]\n· 완성된 작품을 패들렛에 게시하여 온라인 시화전 운영하기\n· 동료의 작품을 감상하며 작품에 담긴 심리학 개념과 의미 탐색하기\n· 댓글 및 감상평을 작성하며 서로의 생각과 배움 공유하기", "closing": "[수업 회고 및 성찰]\n· 심리학 수업을 통해 새롭게 알게 된 점과 변화한 생각 나누기\n· 단원 전체 학습 과정을 되돌아보며 학습 의미 성찰하기"}}], "id": "ch12", "pdf": "pdf/ch12.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(지구시스템과학-홍주고-홍성준).pdf", "meta": {"curriculum": "2022", "subject": "지구시스템과학", "teacher": "홍성준(홍주고등학교)", "unit": "Ⅱ. 해수의 운동 – 05. 조석", "code": "12지시02-04", "standard": "조석의 발생 과정을 이해하고 자료 해석을 통해 각 지역에서의 조석 양상을 설명할 수 있다.", "category": "과학·수학", "school": "홍주고등학교", "teacher_name": "홍성준"}, "stage1": {"total_periods": "3차시", "explanation": "기조력으로 발생하는 조석 현상의 원리를 이해하고, 실제 관측 자료를 해석하여 우\n리나라의 조석 양상을 설명한다. 실측 빅데이터를 그래프로 시각화하여 해역별 조\n석 패턴을 도출하는 디지털 탐구를 수행한다.", "know": "-기조력으로 조석이 발생하는 과정을 설명할 수 있다.\n-달에 의한 기조력과 태양에 의한 기조력의 크기를 비교하여 설명할 수 있다.\n-우리나라 해안의 하루 및 한 달 동안 조석 양상을 옳게 설명할 수 있다.", "skill": "-우리나라 해안의 한 달 동안 조석 자료를 그래프로 올바르게 변환할 수 있다.\n-지구 규모의 빅데이터와 시뮬레이션을 통해 각 지역에서의 조석 양상의 차이점과\n조석 현상의 패턴을 추론할 수 있다.", "value": "-우리나라 해안의 조석 자료를 수집하고 변환하는 모둠 활동 때 자신에게 주어진\n역할을 충실히 수행할 수 있다.\n-조석 그래프를 탐구하는 과정에서 객관적인 데이터에 기반하여 추론하는 과학적\n태도를 지닌다.\n-온라인 보드를 활용한 서술형 답안 공유 및 피드백 과정에서 타인의 과학적 논증\n을 개방적인 태도로 검토하고 소통할 수 있다.", "eval_goal": "실시간 조석 실측 데이터를 스스로 수집 및 시각화하여 조석 패턴의 특징을 과학\n적으로 해석할 수 있으며, 천체의 상대적 위치 변화에 따른 조차 변동성을 기조력\n을 이용하여 추론하고 온라인 보드를 통해 논리적으로 공유할 수 있는지 평가한다.", "eval_content": "① 해역별 실시간 조석 데이터 수집 및 기본 개념 정리\n② 구글 스프레드시트를 활용한 조석 곡선 구현 및 패턴 해석\n③ 천체 운동 기반 조석 변동성 의견 공유, 서술형 평가", "eval_method": "- 수행평가(활동지·기록지·디지털 산출물 과정 중심 종합 평가)\n- 발표 평가(퀴즈앤 보드를 통한 온라인 갤러리 워크)\n- 서술형 평가"}, "lessons": [{"topic": "조석 현상의 이해와 데이터 수집", "concept": "조석, 만조, 간조, 조차, 대조(사리), 소조(조금), 조석 양상", "method": "□ 협동학습 ▣ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "", "steps": {"intro": "[생각열기]\n- 조석 현상과 관련된 영상 시청\n(서해안 앞바다의 밀물 썰물 타입랩스 영상, 밀물에 고립된 사람들의 안전사고 뉴스)\nhttps://www.youtube.com/watch?v=d0lTw6tcAww\n[반복되는 갯벌사고…밀물보고 나오면 이미 늦어 / 연합뉴스TV]\n[동기유발]\n- [마주온-퀴즈앤 보드] 에 '내가 경험했거나 알고 있는 조석 현상(갯벌 체험, 바다\n낚시 등)'을 자유롭게 적어 공유하며 학습 동기 유발", "body": "[학습 목표 안내]\n- 학습 목표: 조석이 발생하는 과정을 설명할 수 있다.\n[개념 탐구]\n1. 기조력(달의 인력 및 원심력)에 의해 발생하는 조석 현상의 원리 이해\n2. 조석 양상, 간조, 만조, 조석 주기, 조차\n3. 일주조, 반일주조, 혼합조, 태양의 영향 – 대조(사리), 소조(조금)\n[문제인식 및 가설설정]\n- 삼면이 바다로 둘러싸인 우리나라 해안 지역의 조석 현상이 어떤 패턴으로 나타\n날지 문제를 인식하고, 가설을 설정해본다.\n- 가설 설정한 내용을 [마주온-퀴즈앤보드]에 공유한다.\n[데이터 수집] - [활동지 1]\n1. <국립해양조사원 누리집-스마트 조석예보>에 접속\n(https://www.khoa.go.kr/swtc/main.do)\n2. 해양 정보-스마트 조석예보에서 동해안, 서해안, 남해안 각 해역의 조위 관측소\n한 곳씩을 선택한다.\n3. 선택한 세 해역의 하루 동안의 조석 그래프를 상세 예측 정보에서 얻고, 실시간\n조석 정보를 기록한다. 선택한 세 해역의 한 달 동안의 조석 자료를 수집한다.\n- 모둠별 소회의실 개설, 탐구할 영역(동해안, 서해안, 남해안) 분담하여 지정한\n다.\n- 지정된 해역의 특정 기간의 시간별 조위 데이터를 다운로드하여 [활동지 1]을\n작성한다.", "closing": "[결과 공유]\n각 모둠이 선택한 해역과 수집한 데이터의 정상 수집 여부 및 [활동지 1] 작성 내\n용을 화면 공유를 통해 확인한다.\n[다음 차시 예고]\n수집한 데이터를 구글 스프레드시트에 업로드하여 디지털 그래프로 시각화하여 조석\n그래프를 표현하고, 각 선택한 지역의 조석 곡선 패턴을 추론하는 활동을 안내한다."}}, {"topic": "실시간 자료를 이용한 해역별 조석 현상 패턴 추론 및\n데이터 시각화", "concept": "조석 정보 기록, 조석 그래프 표현, 데이터 시각화, 삼면 해역의 조석 양상 비교\n분석, 지형적 요인 원인 추론, 가설 검증", "method": "▣ 협동학습 ▣ 탐구학습 □ 문제중심학습 ▣ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "", "steps": {"intro": "[탐구 목표 확인]\n- 탐구 목표 : 실시간 자료를 활용하여 우리나라 해안 지역의 조석 현상 패턴을 추\n론할 수 있다.\n[전 차시 환기]\n- 1차시 모둠별로 지정한 해역(서해안, 동해안, 남해안 중 1개)의 한달동안의 1시\n간 간격의 예측 조위 데이터 파일을 재 확인하고, 1차시의 초기 가설을 상기시\n켜 수치 데이터를 그래프로 시각화하여 가설을 검증해 봄을 안내한다.\n[준비 점검]\n- 각 모둠별로 구글 스프레드시트 공유 링크와 활성화 여부를 확인하고, 데이터 전\n처리 준비 상태를 점검한다.", "body": "[데이터 시각화]\n- [참고자료(2차시)] 내용을 이용하여 한 달 간의 조위 엑셀 데이터를 구글 스프레드\n시트에 올바르게 가져와 데이터 범위를 설정\n- 시간(X축), 조위(Y축) 데이터를 선택하고 매끄러운 선 그래프 기능을 이용하여\n한달동안의 조석 곡선을 그래프로 시각화\n(구글 시트 및 데이터 시각화 자료 예시)\n서해안 - 인천 동해안 - 울릉도 남해안 - 거문도\n- 완성된 그래프 [마주온-퀴즈앤보드]에 업로드\n[그래프 해석 및 분석] - [활동지 2]\n- 생성된 조석 곡선을 바탕으로 다음 과학적 사실을 추론하는 모둠 토의 진행\n- 1~6 문항 토의 및 결론 도출하여 활동지 작성 및 퀴즈앤 보드 업로드\n(대조/소조 찾기, 대조/소조 일 때 달의 위상 찾기, 세 해역의 조석 그래프를 보\n고 차이점 설명하기, 세 해역의 대조/소조/조차 비교하기, 삼면 해역에서의 조석\n양상과 원인 추론하기)\n- 과정 중심 평가 진행"}}, {"topic": "천체의 상대적 위치에 따른 조차의 변화 탐구하기", "concept": "자료를 해석하여 조석 주기와 조차를 구하기, 천체의 상대적 위치에 따른 조차 설\n명하기", "method": "▣ 협동학습 ▣ 탐구학습 □ 문제중심학습 ▣ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "", "steps": {"intro": "[개념 복습]\n- 기조력으로 조석이 발생하는 과정 개념 복습\n- 달에 의한 기조력과 태양에 의한 기조력의 크기 비교\n- 2차시 활동과 3차시 활동의 연계성 강조\n[문제 제기 및 탐구 목표 안내] [활동지3]\n- (가) 하루동안 변화하는 해수면의 높이 그래프와 (나)태양,지구,달의 상대적 위치\n가 드러난 [활동지3] 제시\n- 천체의 위치가 변하면 조석 그래프는 어떻게 바뀔지 질문 제공\n[학습 목표 제시]\n- 달과 태양의 위치 변화에 따른 기조력의 변화를 추론할 수 있다.", "body": "[모둠별 문항 협동 해결] [활동지3]\n- 소회의실 이동 및 역할 분담 : 제시한 서술형 문항 확인\n- 그래프의 조석 주기와 조차 계산, 천체 위치 변화에 따른 기조력 변화 원인을 글\n로 표현\n- 1~4번 문항 해결 (조석 주기와 최대 조차 계산 및 근거 서술, 현재 천체의 위치\n에 따른 인력 작용 특징 분석, 일주일 후 천체 변화가 조석 그래프에 미치는 영\n향을 서술하여 표현)\n[결과 공유 및 의견 나눔]\n- [마주온-퀴즈앤 보드]에 모둠별로 최종 도출한 서술형 답안 실시간 업로드\n- 온라인 갤러리 워크 형식으로 퀴즈앤 보드의 다른 모둠의 답안을 자유롭게 검토\n하고 과학적 근거가 타당한지 분석함.\n- 다른 모둠이 해석한 과학적 근거를 읽으며 우리 모둠의 생각과 비교하고 새롭게\n배운 점이나 인상 깊은 표현을 찾아본다.\n- 댓글 기능을 활용하여 보완이 필요한 부분에 대해 의견 작성 및 나눔하고, 다른\n모둠 답안의 우수한 점을 칭찬하고 보완할 점을 긍정적인 방향으로 보완하여 의\n견을 제시한다.\n- 다른 모둠의 피드백 댓글을 확인하여, 생각을 공유하고 탐구 내용을 보완함", "closing": "[개념 정교화 및 피드백]\n- 하현, 상현 위치에서 기조력이 상쇄되는 원리 최종 정리\n- 일주일 후 삭, 망 위치로 변할 때 천체의 인력이 합성되는 메커니즘에 관한 시각\n자료 제공\n[수업 정리 및 다음 차시 예고]\n- 과정 중심 평가 요소 안내 및 수업 마무리"}}], "id": "ch13", "pdf": "pdf/ch13.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(프로그래밍-갈산고-은용식).pdf", "meta": {"curriculum": "2022", "subject": "프로그래밍", "teacher": "은용식 (갈산고등학교)", "unit": "II. 문제해결과 프로그래밍", "code": "프그 02-04", "standard": "순차, 선택, 반복의 제어 구조를 이해하고, 문제 상황에 알맞은 제어 구조를 선택하여 이를 적용한 프로그램을 작성할 수 있다.", "category": "공학·정보", "school": "갈산고등학교", "teacher_name": "은용식"}, "stage1": {"total_periods": "6차시", "explanation": "순차, 선택, 반복이라는 3대 핵심 제어 구조의 작동 원리와 논리적 흐름을 깊이 있\n게 탐구한다. 단일 조건문(if)에서 다중 조건 분기(if-elif-else), 횟수 제어 반복\n(for)과 조건 제어 반복(while)의 메커니즘 차이를 명확히 이해하고, 이를 복합적으\n로 결합한 중첩 제어 구조 프로그램을 설계·구현하는 능력을 강조한다. AI 코스웨\n어 대시보드가 제공하는 정량적 학습 데이터(수행률, 코드 실행 분석)를 기반으로\n학생 맞춤형 피드백을 제공하여, 문제 해결 과정 중심의 실시간 디버깅 및 알고리\n즘 최적화 활동을 극대화한다.", "know": "· 조건식 작성을 위한 비교연산자(>, >=, ==, !=) 및 논리연산자의 개념\n· 조건문(if, if-else, if-elif-else)의 실행 흐름과 조건 분기 원리\n· 반복문(for, while)의 구동 원리 및 range() 함수의 매개변수 제어 규칙\n· 루프의 실행 흐름을 강제 제어하는 break와 continue 구문의 특성\n· 중첩 제어 구조(조건-조건, 반복-조건, 반복-반복)의 개념과 2차원 공간 표현 원리", "skill": "· 주어진 문제 상황을 분석하여 입력·처리·출력으로 추상화하기\n· 문제 해결 시나리오에 알맞은 제어 구조를 도출하고 이를 흐름도로 표현하기\n· AI 코스웨어를 활용해 문법 오류와 구동 실패 원인을 자가 진단하기\n· 코들의 실시간 피드백 및 대시보드 분석 결과를 반영하여 소스 코드를 지속적으\n로 디버깅하고 고도화하기", "value": "· 복잡한 에러 메시지와 논리적 예외 상황을 마주했을 때 포기하지 않고 해결하려\n는 과제 집착력\n· 일상의 수작업이나 비효율적인 업무를 자동화 프로그램 설계로 개선하려는 창의\n적·실천적 태도\n· 디지털 실습실 환경에서 타인의 소스 코드를 존중하고 기술 활용 시 디지털 윤리\n를 준수하는 시민성", "eval_goal": "순차, 선택, 반복의 제어 구조 및 중첩 제어 구조를 정확히 이해하고 , 주어진 실\n생활 문제 상황의 요구사항을 만족하는 파이썬 프로그램을 오류 없이 구현 및 해\n석할 수 있는지를 평가한다.", "eval_content": "① 발표 및 문제 정리: 도전문제 분석, 알고리즘 설계 및 기록의 명확성\n② 프로그래밍 문제 해결: 파이썬을 활용한 제어 구조 소스 코드 구현력\n③ 프로그래밍 해석 및 기록: 구현된 코드를 완벽히 해석하고 논리를 서술하는 능력", "eval_method": "· AI 코스웨어 과정 중심 평가: 코들 대시보드 기반 문항별 수행률 및 코드 실행\n분석 데이터를 통한 실시간 과정 평가 및 개인별 맞춤 피드백 누적\n· 프로젝트 및 구술·발표 평가: 구현된 프로그램의 제어 로직 정합성을 설명하고\n퀴즈앤 보드를 통한 상호 코드 리뷰 및 동료 피드백 진행"}, "lessons": [{"topic": "if문과 비교연산자\n- \"상황에 따라 다르게 작동하는 프로그램\"", "concept": "조건문의 개념 , 비교연산자의 종류와 의미 , 단일 조건문(if)의 실행 흐름", "method": "□ 협동학습 ☑ 탐구학습 ☑ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ☑ 블랜디드 러닝 □ 기타( )", "period": "1/6", "steps": {"intro": "▶ 수업 시작 전 크롬 브라우저를 통해 코들에 접속할 수 있도록 한다.\n❍ 전 차시 학습 확인\n- 문자열 슬라이싱의 개념과 활용 사례를 발문한다.\n❍ 학습 동기 유발\n- [여러 가지 조건에 따라 전혀 다른 결과를 출력하는 프로그램]에 대해 발문한다.\n“콜라를 뽑을 수 있는 버튼을 누르면 콜라가 나오고, 사이다를 뽑을 수 있는 버\n튼을 누르면 사이다가 나오는 음료수 자판기의 코딩은 어떻게 할까?”\n동기유발자료1 동기유발자료2\n❍ 학습 목표 제시\n❍ 학습 활동 안내\n① 개념학습\n- 조건문의 개념\n- 조건문과 함께 사용할 수 있는 비교연산자의 종류\n- 조건문의 활용 방법: if문\n② 조건문 프로그래밍 실습\n- 절대값 찾기\n- 초과할 경우 다른 값 출력\n- 특정 값이 입력된 경우 특정한 결과 값 출력", "body": "❍ 개념 학습\n가. 조건문의 개념\n- 조건문의 개념에 대해 설명한다.\n- 조건문을 활용한 사례를 보여주고 이해하도록 한다.\n나. 비교연산자의 종류\n- >, >=, ==, ! = 등 비교연산자의 종류를 설명한다.\n- 비교연산자 == 와 대입연산자 =를 구분해서 사용하도록 안내한다."}}, {"topic": "if-else 및 if-elif-else문\n- \"다중 조건과 복합 제어 구조\"", "concept": "양방향 조건문(if-else)의 구조, 다중 조건문(if-elif-else)의 구조", "method": "□ 협동학습 □ 탐구학습 ☑ 문제중심학습 □ 토의•토론학습\n☑ 프로젝트 학습 □ 거꾸로학습 ☑ 블랜디드 러닝 □ 기타( )", "period": "2/6", "steps": {"intro": "▶ 수업 시작 전 크롬 브라우저를 통해 코들에 접속할 수 있도록 한다.\n❍ 전 차시 학습 확인\n- if문의 개념과 활용 사례를 발문한다.\n❍ 학습 동기 유발\n- [다양한 조건, 또는 조건 안의 또 다른 조건이 구현된 프로그램]에 대해 발문\n한다.\n“학생 성적에 따른 학점의 부여, 또는 사용자의 나이에 따른 요금을 부과할 수\n있는 프로그램은 어떻게 구현이 될까?”\n동기유발자료1 동기유발자료2\n❍ 학습 목표 제시\n❍ 학습 활동 안내\n① 개념학습\n- if-else문의 개념과 활용 사례\n- if-elif-else문의 개념과 활용 사례\n② 조건문 프로그래밍 실습\n- if-else문: 정수의 참 거짓\n- if-else문: 짝수 출력하기\n- if-elif-else문: 점수 등급 분류하기\n- if-elif-else문: 이번 달은 무슨 계절일까요?", "body": "❍ 개념 학습\n가. if-else문\n- if-else문의 개념에 대해 설명한다.\n- if-else문을 활용한 사례를 보여주고 이해하도록 한다."}}, {"topic": "for문과 range 함수\n- \"규칙적인 작업 자동화하기\"", "concept": "반복문의 필요성, for문의 문법 구조, range() 함수의 매개변수 제어", "method": "□ 협동학습 ☑ 탐구학습 ☑ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ☑ 블랜디드 러닝 □ 기타( )", "period": "3/6", "steps": {"intro": "▶ 수업 시작 전 크롬 브라우저를 통해 코들에 접속할 수 있도록 한다.\n❍ 전 차시 학습 확인\n- if-else문의 개념과 활용 사례를 발문한다.\n- if-elif-else문의 개념과 활용 사례를 발문한다.\n❍ 학습 동기 유발\n- [원하는 횟수만큼의 반복 작업이 구현된 프로그램]에 대해 발문한다.\n“새해를 맞이하여 카운트다운을 하는 프로그램을 적성할 때 10번씩 출력되도록\n반복하는 방법은 없을까?”\n동기유발자료1 동기유발자료2\n❍ 학습 목표 제시\n❍ 학습 활동 안내\n① 개념학습1\n- 반복문의 개념과 활용 사례\n- 리스트 및 문자열과 함께 사용되는 반복문의 활용 사례\n② 반복문 기초 실습\n- 양수만 출력하기\n- 온점의 개수 맞추기\n③ 개념학습2\n- range 함수 활용의 기초\n- 다양한 range 함수 사용 방법\n④ for in range 함수 기초 실습\n- 100번 출력하기\n- 카운트다운 프로그램 작성", "body": "❍ 개념 학습 1\n가. 반목문의 개념과 활용 사례\n- 반복문의 개념에 대해 설명한다.\n- 반복문이 사용될 수 있는 사례에 대해 설명한다."}}, {"topic": "리스트 index 활용 및 이중 for문\n- \"2차원 공간과 행렬 패턴 탐색\"", "concept": "반복문 내 리스트 index
