를 발문한다.\n❍ 학습 동기 유발\n- [조건문과 반복문이 함께 포함된 프로그램]에 대해 발문한다.\n“계산기처럼 사용자가 더하기, 빼기, 곱하기, 나누기 등을 선택하면 해당하는 기능을 반\n복하여 사용할 수 있듯이, 컴퓨터에서도 컴퓨터로 구현하려면 어떻게 해야 할까?”\n동기유발자료1 동기유발자료2"}}], "id": "ch14", "pdf": "pdf/ch14.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집 양식(회계원리-대천여자고등학교-이인화).pdf", "meta": {"curriculum": "2022", "subject": "회계원리", "teacher": "이인화(대천여자고등학교)", "unit": "4. 회계 윤리와 회계 기준", "code": "[회원01-04-01]\n~ [회원01-04-02]", "standard": "회계 윤리의 뜻과 기업의 사회적 책임을 위한 회계 윤리의 중요성을 탐구하고 이에 대해 토론하며 회계 윤리 관련 분식회계 사례를 조사하여 발표할 수 있다.", "category": "직업·실무", "school": "대천여자고등학교", "teacher_name": "이인화"}, "stage1": {"total_periods": "4차시", "explanation": "기업이나 조직의 재무 상태와 경영 성과를 전달하기 위한 방법인 회계의 중요성과\n회계가 기업과 조직의 사익을 위해 올바르지 않게 사용되는 분식회계(회계부정)의\n문제점을 사례를 통해 파악하고 이를 통해 학생이 스스로 회계 윤리의 중요성을\n깨닫게 한다. 또한 이전까지 학습했던 회계에 대한 지식을 바탕으로 분식회계가 회\n계적으로 어떠한 방법을 통해 이루어졌는지에 대해 조사하고 이를 발표하므로 강\n한 회계 기준이 필요함을 발견할 수 있도록 한다.", "know": "· 분식회계의 의미와 실제 사례를 통한 사회에 미치는 영향력 이해\n· 회계 기준의 필요성과 전문가로서 사회적 책임 이해\n· 분식회계의 다양한 방법에 대한 학습(재고자산 과대 계상, 매출 조기 인식, 가공\n매출 계상 등)", "skill": "· 수업을 통해 분식회계의 의미와 실제 기업의 사례 학습하기\n· 프로젝트 학습을 통해 분식회계 기업을 선정하고 이에 대한 보고서 작성하기\n· 작성한 보고서 내용을 바탕으로 분식회계 사례를 공유하기\n· 회계적인 지식을 활용하여 분식회계의 방법을 찾아내는 협동학습 참여하기", "value": "· 회계 윤리의 중요성과 분식회계로 인한 결과에 민감하게 반응하는 태도\n· 프로젝트 학습을 주도적으로 진행하고 팀원과 협력하여 결과를 도출할 수 있는\n협동 능력\n· 결과물을 제작하기 위해 여러 에듀테크를 활용할 수 있는 적용 능력", "eval_goal": "분식회계의 의미와 필요성을 명확하게 이해하고, 이를 바탕으로 실제 사례를 조사\n하고 발표하며, 분식회계의 구체적인 방법을 찾아낼 수 있는지를 평가한다.", "eval_content": "① 회계윤리 및 회계기준에 대한 구술 평가 : 회계 윤리 및 분식회계의 의미, 현재\n한국에서 활용하고 있는 회계 기준에 대해 인지하고 있는지 구술 평가 실시\n② 프로젝트 탐구 보고서 제출 : 분식회계의 사례, 분식회계의 방법, 이로 인한 사\n회적 파장을 포함하고 있는 탐구 보고서 제출 및 발표 자료 제작(피피티 4쪽\n이상)\n③ 분식회계 탐정 활동 및 정답 도출 하기 : 학습한 내용을 바탕으로 교사가 재구\n성한 재무상태표, 손익계산서를 보고 어떠한 방식으로 분식회계를 저질렀는지\n파악하고 토의하여 정답을 도출", "eval_method": "· 발표 평가(루브릭에 의한 평가)\n· 프로젝트 학습 산출물 평가(패들렛을 활용한 과정중심평가 및 카드 뉴스 제작 상\n태에 대한 산출물 평가)\n· 수업 중 형성평가(팀별 토의를 통한 분식회계의 방법을 탐구하는 탐정 활동에 대\n한 형성 평가 진행)"}, "lessons": [{"topic": "회계윤리의 중요성과 필요성", "concept": "회계윤리의 의미, 회계윤리의 중요성, 분식회계의 의미, 기업의 사회적 책임", "method": "þ 협동학습 □ 탐구학습 □ 문제중심학습 þ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/4", "steps": {"intro": "<전시학습 확인>\n- 분개와 전기에 대한 간단한 진위형 문제 제시\n- 이전에 학습한 회계상 거래의 특징과 구체적인 거래의 사례를 분개하는 발문 제\n시\n<동기 유발>\n- 분식회계의 정의에 대한 설명\n- 분식회계의 대표적인 사례 제시\n동기유발자료1(분식의 의미) 동기유발자료2(회계 부정 사례)\n<학습 목표 제시>\n- 회계 윤리의 중요성과 필요성\n- 분식회계의 의미와 기업의 사회적 책임", "body": "<개념 학습>\n[충남온배움터-팀보드 활용]\n회계 윤리의 의미와 필요성, 분식회계의 의미와 사례에 대한 개념학습 진행\n<분식회계의 사례 제시>\n루이싱 커피, 대우조선해양 등의 구체적인 분식회계의 사례를 제시하고 분식회계의\n파급효과와 기업의 사회적 책임에 대한 의견 공유 실시\n<프로젝트 학습 –1차시>\n[충남온배움터-과제제출 및 패들렛 활용]\n팀을 선정한 후 수업 중 제시되지 않는 분식회계의 사례 중 하나를 선정하고, 이와\n관련된 뉴스 기사 및 선정 동기를 패들렛에 공유하고 이를 발표함."}}, {"topic": "분식회계 탐정 되어보기", "concept": "분식회계의 일반적인 방법, 분식회계가 사회에 미치는 파급효과", "method": "þ 협동학습 □ 탐구학습 þ 문제중심학습 □ 토의•토론학습\nþ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/4", "steps": {"intro": "<전시 학습 확인>\n- 분식회계의 의미, 회계 윤리의 중요성에 대해 묻는 발문\n- 조사했던 분식회계의 구체적인 사례에 대한 발문\n<동기 유발 및 차시 활동 안내 >\n- 분식 회계 탐정 수업 소개\n- 임시 회계 탐정이 되기 위해 10문제의 문제를 풀어야 함을 제시\n- 회계 탐정 임명장 발급 후 직접 회계 탐정이 되어 교사가 재구성한 재무제표(재\n무상태표 및 손익계산서)를 보고 분식회계의 방법을 맞추어야 함을 예고", "body": "<전개1 : 임시 회계 수사관 자격시험>\n- 이전까지 학습했던 재무상태표, 손익계산서의 개념과 계정과목에 대한 이해를 점\n검하기 위한 10문항의 문제를 학생들이 풀어볼 수 있도록 학습지로 제시"}}, {"topic": "회계 기준의 필요성", "concept": "분식회계를 방지하기 위한 다양한 회계 기준", "method": "□ 협동학습 þ 탐구학습 □ 문제중심학습 □ 토의•토론학습\nþ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/4", "steps": {}}, {"topic": "분식회계의 문제점과 회계 기준의 필요성", "concept": "분식회계의 문제점, 회계기준의 필요성", "method": "þ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의•토론학습\nþ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "4/4", "steps": {"intro": "<전시학습 확인>\n- 회계 기준의 종류에 대한 진위형, 단답형 문항으로 전시학습 확인\n- 프로젝트 학습 2차시에 대한 발문으로 현안 파악\n<동기 유발 및 차시 활동 안내 >\n- 프로젝트 학습의 마지막 차시인 만큼 이제까지의 학습의 결과를 잘 도출할 수\n있도록 격려\n- 카드 뉴스의 형태로 이전의 탐구를 재구성하여 발표할 것을 안내", "body": "<전개1 : 프로젝트 학습 3차시 : 카드뉴스 제작하기 >\n[패들렛 및 미리캔버스 활용 ]\n- 이전까지 탐구한 내용을 바탕으로 4페이지 이내의 카드 뉴스를 제작하여 패들렛\n에 업로드\n- 시인성을 위해 미리캔버스를 활용해 한눈에 알아볼 수 있도록 제작해야함을 권\n고\n- 카드뉴스에 4가지 구성요소(의미, 방법, 파급효과, 방지방법)이 모두 들어갈 수\n있도록 지도\n학생 제작 카드 뉴스 예시1 학생 제작 카드 뉴스 예시2\n<전개2: 프로젝트 학습 발표>\n- 5분 이내의 시간동안 분석한 내용을 발표할 수 있도록 안내\n- 발표 후 학생들이 팀별로 1가지의 질의를 할 수 있도록 지도", "closing": "<결과 공유 및 성찰>\n- 분식회계의 파급효과, 회계 기준의 필요성에 대해 본인이 깨달은 점에 대해 서로\n공유\n<다음 차시 예고>"}}], "id": "ch15", "pdf": "pdf/ch15.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집(2022법과사회-서산중앙고등학교-오욱석).pdf", "meta": {"curriculum": "2022", "subject": "법과사회", "teacher": "서산중앙고등학교", "unit": "2. 국가생활과 법(헌법의 기본원리와 기본권)", "code": "12법사02-02", "standard": "우리나라 헌법의 기본 원리와 기본권 내용을 이해하고, 기본권 제한의 요건과 한계를 탐구한다.", "category": "인문·사회", "school": "서산중앙고등학교", "teacher_name": ""}, "stage1": {"total_periods": "3차시", "explanation": "현대 국가에서 민주주의와 법치주의가 헌법을 통해 구현된다는 점과 우리나라의\n헌법에서 나타난 기본 원리가 무엇인지 이해한다. 우리나라 헌법이 어떤 기본권을\n보장하고 어떤 경우에 기본권이 제한될 수 있는지에 대해 분석하고, 기본권 제한의\n사례를 통하여 요건과 한계를 탐구한다.", "know": "⋅우리나라 헌법의 기본원리\n⋅헌법이 보장하는 기본권의 종류와 내용\n⋅기본권 제한의 요건과 한계", "skill": "⋅우리나라 헌법의 기본권 보장 및 제한 사유 분석하기\n⋅기본권 충돌 시 해결할 수 있는 방안 탐구하기\n⋅구체적인 기본권 제한 사례를 통해 제한 요건과 한계 탐구하기", "value": "⋅헌법과 민주주의 및 법치주의에 대한 존중\n⋅국민의 기본권 보장에 대한 가치 인식\n⋅기본권 제한의 정당성 및 한계에 대한 비판적⋅성찰적 태도"}, "lessons": [{"topic": "대한민국 헌법의 전문과 총강에 나타난 헌법의 기본원\n리 탐구", "concept": "⋅헌법의 기본원리(국민주권주의, 자유민주주의, 복지국가주의, 평화통일주의, 문화국가\n원리, 국제평화주의)", "method": "□ 협동학습 ■ 탐구학습 ■ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[생각열기]\n⋅가상 상황:화면 공유를 통해 무인도 그래픽을 띄우고 돌발 미션 제시\n(무인도에 표류되어 새로운 국가를 세우게 되었을 때, 가장 먼저 만들어야할 법적 가치\n나 규칙 3가지 정하기)\n⋅ 실시간으로 자신이 생각한 문장또는 단어 입력(예:안전, 평등, 자유, 평화 등)\n(마주온 - 퀴즈엔보드 활용)\n⋅실시간으로 올라오는 텍스트에 대해 화면 공유를 통해 자신이 쓴 내용에 대해 의견을\n말하며 가장 많이 쓰인 단어나 표현 문구 찾아보기\n⋅빈도 수가 많은 표현 문구들을 조합하여 대한민국 헌법의 기본원리 소개하기", "body": "[학습 목표 안내]\n⋅우리나라 헌법의 전문과 총강을 분석하여 헌법의 기본원리 6가지를 도출할 수 있다.\n[문제 상황 속 개념 탐구]\n⋅대한민국 헌법 전문에 담긴 내용을 6대 기본원리를 통해 분석하기\n⋅6대 기본원리(국민주권주의, 자유민주주의, 복지국가의 원리, 평화통일주의, 문화국가\n의 원리, 국제평화주의) 핵심 개념을 화이트보드를 활용한 교수학습\n[총강 속 기본원리 적용하기]\n⋅총강(1조~9조)까지의 내용 중 각각 어떤 기본원리에 속하는지 탐구하기\n⋅우리 일상 속 기본원리가 어떻게 구현되는지 구체적인 예시 찾아보기"}}, {"topic": "헌법이 보장하는 국민의 기본권 종류와 핵심 특징 탐구", "concept": "⋅기본권, 인간의 존엄과 가치 및 행복추구권, 자유권, 평등권, 참정권, 사회권, 청구권", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[동기유발]\n⋅멘티미터를 활용하여 학생들이 일상에서 당연하게 누리는 권리들을 짧은 문장으로 입력\n(예: 학교 끝나고 PC방 가기, SNS에 내 의견 올리기 등등)\n⋅실시간 투표(선택)을 활용한 밸런스 게임 진행\n(예:‘평생 내 의견을 말할 수 없지만 국가가 모든 의식주를 최고급으로 보장해주기 vs. 내 힘\n으로 힘들게 일하면서 벌어먹고 살아야 하지만 내 생각과 자유는 완벽하게 보장받기)\n[교사 피드백 및 연결]\n⋅학생들이 선택한 가치들이 헌법에서 보장하는 어떤 권리와 맞닿아 있는지 가볍게 짚어주면\n서 주의 환기\n[학습목표안내]\n⋅헌법이 보장하는 기본권의 의미와 성격을 이해하고 이를 바탕으로 현대 사회에 필요한 새로\n운 기본권 조문을 제시할 수 있다.", "body": "[기본권 개념 및 종류]\n⋅기본권의 개념과 종류를 헌법 조문의 예시와 함께 학습"}}, {"topic": "헌법 제37조 2항을 통해 본 기본권 제한의 요건과 한\n계 분석", "concept": "⋅기본권 제한 ⋅헌법 제37조 2항 ⋅과잉금지의 원칙", "method": "□ 협동학습 ■ 탐구학습 ■ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[동기 유발]\n⋅‘학교나 교육청에서 원격 수업 중 모든 학생의 카메라 켜기를 의무하고 거부시 불이익\n을 준다면 이는 정당한 제한일까요? 기본권 침해일까요?’ 즉석에서 찬성과 반대 투표\n시행\n[학습 목표 안내]\n⋅헌법 제37조 2항을 바탕으로 기본권 제한의 목적, 방법, 형식, 한계 등을 이해하고 실\n제 판례 및 일상 예시를 통해 제한의 정당성을 비판적으로 분석할 수 있다.", "body": "[헌법 제37조 제2항 법리 해석]\n* 헌법 제37조 제2항 조문을 화면에 띄우고 핵심 키워드 중심 분석\n1. 목적: 국가안전보장, 질서유지, 공공복리\n2. 방법: 필요한 경우에 한하여(과잉금지의 원칙)\n2. 형식: 국회가 제정한 '법률'로만 제한 가능\n3. 한계: 자유와 권리의 '본질적인 내용'은 침해 불가\n* 국가 권력의 남용을 막기 위한 '과잉금지원칙(목적의 정당성, 수단의 적합성, 피해의 최소\n성, 법익의 균형성)'의 개념을 일상적 예시(예: 파리를 잡기 위해 도끼를 쓸 수 없는 이유)를\n들어 쉽게 설명\n[디지털 판례/사례 탐구 및 토의]\n* 디지털 도구 활용: 헌법재판소 종합법률정보(search.ccourt.go.kr)의 쉬운 판례 자\n료나 교사가 재구성한 사례 카드 제공\n* 모둠별 소회의실에서 제시된 실제 예시(예: 심야 시간 청소년 셧다운제, 감염병 예방을 위\n한 집회 금지 등)를 보고, 이 제한이 헌법 제37조 제2항과 과잉금지원칙을 잘 지켰는지 마\n주온 퀴즈앤보드를 활용해 찬반 토의 및 분석서 작성하기", "closing": "[비판적 성찰 및 단원 마무리]\n* 모둠별 분석 결과를 실시간 화면 공유로 발표하며, 공공의 이익을 위한 제한이라 할지\n라도 헌법적 한계를 반드시 준수해야 함을 내면화\n* 심화 및 실천 다짐(온라인 전시 연계): 퀴즈앤보드에 오늘 배운 법리를 바탕으로 '우리\n학교나 사회의 규칙 중 과잉금지원칙에 어긋나는 사례가 있다면 어떻게 고치면 좋을지'\n한 줄 대안 및 실천 다짐을 남기며 전체 단원 총평 마무리"}}], "id": "ch16", "pdf": "pdf/ch16.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집(2022지구과학-충남온라인학교-이해민).pdf", "meta": {"curriculum": "2022", "subject": "지구과학", "teacher": "이해민(충남온라인학교)", "unit": "01. 해수의 성질과 순환 1) 해수의 성질", "code": "12지구01-01", "standard": "실측 자료를 활용하여 해수의 온도, 염분, 밀도 분포를 분석·해석할 수 있다.", "category": "과학·수학", "school": "충남온라인학교", "teacher_name": "이해민"}, "stage1": {"total_periods": "3차시", "explanation": "해수의 밀도가 수온과 염분에 따라 결정된다는 것을 T-S 다이어그램을 통해서 이\n해시키고, 인공위성 및 ARGO 자료 등 전 지구 규모의 빅데이터 실측 자료를 활용\n하여 학생들 스스로 데이터를 분석하고 해석함으로써 디지털 소양을 기르는 것을\n강조한다.", "know": "⋅해수의 성질 ⋅수온과 염분", "skill": "⋅변인을 조작적으로 정의하여 탐구 설계하기\n⋅다양한 도구와 수학적 사고를 활용하여 정보를 조사⋅수집⋅해석하기\n⋅증거에 기반한 과학적 사고를 통해 자료를 과학적으로 분석⋅평가⋅추론하기", "value": "⋅과학 유용성\n⋅자연과 과학에 대한 감수성\n⋅과학 문제해결에 대한 개방성\n⋅안전⋅지속가능 사회에 기여"}, "lessons": [{"topic": "해양 위기 공감 및 해수의 물리⋅화학적 성질과 T-S 다\n이어그램의 이해", "concept": "⋅해수의 성질 ⋅수온과 염분 ⋅T-S 다이어그램", "method": "□ 협동학습 □ 탐구학습 ■ 문제중심학습 ■ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {}}, {"topic": "인공위성 및 ARGO 실측 빅데이터 수집 및 시각화 탐구", "concept": "⋅실측 자료 분석 ⋅T-S 다이어그램 해석 및 적용", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[탐구 목표 확인]\n⋅인공위성과 ARGO 플로트가 전 세계 바다를 관측하는 원리 및 데이터 수집의 중요성 소개\nhttp://argo.nims.go.kr/argo3/ (국립기상과학원 ARGO – ARGO 소개 페이지 참고)\n⋅학습 목표 안내: 수집된 실측 자료를 활용하여 해수 성질의 분포를 분석하고 해석하기", "body": "[데이터 수집 및 처리(디지털 도구 활용)]\n⋅모둠별로 디지털 기기를 활용해 기상청 또는 공공 데이터 포털에서 ARGO 실측 데이터\n(수온, 염분 등) 다운로드\nhttps://data.kma.go.kr (기상청 날씨데이터 서비스 기상 자료 개방 포털)\nhttp://argo.nims.go.kr (국립기상과학원 ARGO – ARGO Global 자료)\n⋅구글 스프레드시트 또는 코랩 등을 이용하여 방대한 수치 데이터를 분석 가능한 형태로\n전처리하기\n[데이터 시각화 및 결과 해석]\n⋅전처리한 데이터를 바탕으로 수온-깊이, 염분-깊이 연직 분포 그래프 그리기\n⋅T-S 다이어그램 그래프 상에 모둠이 수집한 데이터를 산점도로 직접 표시하고 등밀도선\n해석하기\n⋅수집한 해역의 특징(예: 적도 부근과 극지방의 밀도 차이 등)을 과학적으로 분석하기", "closing": "[결과 공유 및 성찰]\n⋅모둠별 데이터 분석 결과 및 작성한 T-S 다이어그램 공유하기\n⋅빅데이터 관측 자료를 직접 다루며 시뮬레이션한 경험을 통해 디지털 소양과 데이터의\n가치 성찰하기"}}, {"topic": "해양 환경 보전을 위한 '나만의 작은 행동 다짐하기'\n포스터 제작 및 발표", "concept": "⋅해양 환경 보전 실천 ⋅기후 변화와 인간 활동", "method": "□ 협동학습 □ 탐구학습 □ 문제중심학습 ■ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[동기 유발 및 프로젝트 안내]\n⋅1차시의 '해양 위기 공감' 내용과 2차시에서 직접 분석한 데이터 결과를 연결하여 해양\n보전의 필요성 환기\n⋅프로젝트 목표 안내: 일상생활에서 실천할 수 있는 해양 환경 보전 방안을 고안하여\n포스터로 제작하고 공유하기", "body": "[포스터 기획 및 제작]\n⋅모둠별 또는 개인별로 해양 오염 방지 및 기후 변화 완화를 위한 '나만의 작은 행동 다짐'\n아이디어 도출 (예: 플라스틱 사용 줄이기, 올바른 분리배출 등)\n⋅디지털 디자인 도구(교육용 캔바, 마주온의 미리캔버스 등)를 활용하여 시각적이고 창의적인\n다짐 포스터 제작하기\n[발표 및 공유]\n⋅완성된 포스터를 마주온 보드에 게시하여 '갤러리 워크' 형태로 상호 관람하기\n⋅각자 자신의 행동 다짐을 짧게 발표하고 질의응답 및 토의 진행하기", "closing": "[상호 평가 및 마무리]\n⋅루브릭을 활용하여 친구들의 포스터 창의성 및 실천 가능성 상호 평가하기\n⋅다 함께 실천 의지를 다지는 선언으로 수업 마무리 및 성취기준 관련 전체 단원 총평"}}], "id": "ch17", "pdf": "pdf/ch17.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집(고급화학-정산고-김강훈).pdf", "meta": {"curriculum": "2022", "subject": "고급화학", "teacher": "김강훈 (정산고등학교)", "unit": "Ⅰ. 4. 02. 탄화수소의 구조", "code": "[12고화01-06", "standard": "포화 및 불포화 탄화수소의 이성질체를 이해하고, 이성질체를 구조식으로 그려 비교할 수 있다.", "category": "과학·수학", "school": "정산고등학교", "teacher_name": "김강훈"}, "stage1": {"total_periods": "3차시", "explanation": "탄소 원자의 결합 특성과 혼성 오비탈에 대한 이해를 바탕으로 탄화수소의 3차원\n구조를 이해하고, 아보가드로(Avogadro) 등 분자 모델링 프로그램을 활용하여 학\n생 스스로 분자를 설계·시각화하며 구조 분석을 통해 이성질체를 비교함으로써 화\n학적 탐구 역량 향상한다.", "know": "· 탄소의 결합 특성과 혼성 오비탈\n· 탄화수소의 분류(포화·불포화, 사슬·고리, 지방족·방향족)\n· 구조 이성질체와 입체 이성질체의 개념과 차이", "skill": "· 분자 모델링 도구를 활용하여 분자의 3차원 구조를 설계·시각화하기\n· 결합각·결합 길이 등 정량 정보를 측정하여 구조를 분석·해석하기\n· 증거에 기반하여 이성질체의 구조와 성질을 비교·추론하기", "value": "· 미시 세계의 구조를 탐구하는 과학적 호기심\n· 컴퓨터 기반 화학 실험을 책임 있게 활용하는 태도\n· 과학적 근거에 기반한 소통 및 협력 활동 수행", "eval_goal": "탄소 화합물의 결합과 구조를 이해하고, 분자 모델링을 통해 탄화수소 이성질체의\n구조적 차이와 성질을 논리적으로 비교·분석할 수 있는지를 평가한다.", "eval_content": "① 개념 이해: 탄소의 결합·혼성 오비탈·탄화수소 구조의 이해(서술형)\n② 모델링 수행: 아보가드로를 활용한 분자 설계 및 구조 측정(실습 관찰)\n③ 이성질체 비교: 모델링 결과를 바탕으로 한 구조–성질 비교·발표(산출물)", "eval_method": "· 과정 중심 평가: 웨일온 화면 공유로 모델링 수행 과정을 실시간 관찰·누적\n· 산출물·발표 평가: 분자 모델·이성질체 비교표·발표 자료 종합 평가\n· 상호 평가: 공유 보드를 통한 동료 피드백 및 자기 성찰 평가 병행"}, "lessons": [{"topic": "탄화수소의 분류와 탄소의 결합", "concept": "탄소의 결합 특성, 혼성 오비탈, 탄화수소의 분류", "method": "□ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ■ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[공감하기]\n· 연료·플라스틱·의약품 등 우리 주변의 다양한 탄소 화합물 사진·영상을 보며 \"왜\n탄소는 이토록 다양한 물질을 만들 수 있을까?\" 발문한다.\nhttps://www.youtube.com/watch?v=5n_LQHXbvXk\n[생각 열기]\n· 같은 분자식(C₄H₁₀)인데도 성질이 다른 물질이 존재할 수 있는 까닭을 추측해 공\n유 보드(마주온-퀴즈앤보드)에 자유롭게 게시한다.\n[학습 목표 제시]\n[학습 활동 안내]\n① 개념학습 — 탄소의 결합 특성 / 혼성 오비탈 / 탄화수소의 분류\n② 구조 그려 보기 — 알케인·알켄·알카인의 결합과 구조 예측하기", "body": "▣ 개념 학습 1. 탄소의 결합 특성\n· 탄소가 원자가 전자 4개로 4개의 공유 결합을 형성하는 까닭을 설명한다.\n· 단일·이중·삼중 결합의 차이와 결합 길이·세기 관계를 안내한다.\n▣ 개념 학습 2. 혼성 오비탈과 분자 구조\n· sp³(정사면체, 약 109.5°), sp²(평면 삼각형, 120°), sp(직선형, 180°)와 결합각·구\n조의 관계를 설명한다.\n· 메테인·에텐·에타인을 예로 혼성과 입체 구조를 연결하여 이해하도록 한다.\n▣ 개념 학습 3. 탄화수소의 분류\n· 포화(알케인)·불포화(알켄·알카인), 사슬형·고리형, 지방족·방향족으로 분류 기준을\n정리한다.", "closing": "[개념 정리 및 다음 차시 예고]\n· 결합 방식–혼성–분자 구조의 관계를 정리한다.\n· 다음 차시에 아보가드로 프로그램으로 직접 분자를 모델링할 것을 안내한다."}}, {"topic": "아보가드로 프로그램 활용 탄화수소 분자 모델링", "concept": "분자 모델링, 3차원 분자 구조, 결합각·결합 길이 측정", "method": "■ 협동학습 ■ 탐구학습 □ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ■ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[탐구 목표 확인]\n· 분자 모델링의 의미와 아보가드로 프로그램의 기능을 소개하고 설치를 안내한다.\n[학습 목표 안내]\n· 탄화수소를 직접 모델링하여 3차원 구조와 결합 정보를 분석한다.", "body": "[프로그램 기초 익히기(교사 화면 공유)]\n· 원자 추가·삭제, 결합 그리기, 도구 사용법을 시연한다.\n· 구조 최적화(Optimize Geometry) 기능으로 안정한 입체 구조를 얻는 방법을 안\n내한다.\n[기본 분자 모델링 실습]\n· 메테인(CH₄), 에테인(C₂H₆), 에텐(C₂H₄), 에타인(C₂H₂)을 모둠별로 모델링하고 공-\n막대 모형을 회전하며 관찰한다.\n[측정 탐구]\n· 측정 도구로 결합각과 결합 길이를 확인하여 혼성오비탈에 따른 분자 구조 및 결\n합각을 비교한다.\n· 단일·이중·삼중 결합에 따른 결합 길이 변화를 관찰·기록한다.\n[모둠 공유]\n· 완성한 분자를 캡처·내보내기하여 공유 보드에 업로드하고 상호 관람한다.", "closing": "[정리 및 성찰]\n· 결합 종류–혼성–입체 구조의 관계를 모델로 확인한 점을 정리한다.\n· 다음 차시에 이성질체를 직접 모델링해 비교할 것을 예고한다."}}, {"topic": "분자 모델링을 통한 이성질체 비교 탐구", "concept": "구조 이성질체, 작용기", "method": "■ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n□ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[문제 상황]\n· \"C₄H₁₀, C₅H₁₂에는 서로 다른 물질이 몇 가지나 존재할까?\"\n발문하고 모둠별로 예측한 결과를 공유 보드(마주온-퀴즈앤보드)에 게시한다.", "body": "❍ 개념 학습. 이성질체의 종류\n· 구조 이성질체: 사슬 이성질체, 위치 이성질체, 작용기 이성질체\n· 입체 이성질체는 간략히만 소개한다. 기하 이성질체 광학 이성질체\n[모델링 탐구]\n· 모둠별로 분자식을 정해 가능한 이성질체를 아보가드로로 분자 모델링 한다.\n· 각 이성질체의 3차원 구조를 회전하며 탄소 골격과 결합 차이를 관찰한다.\n[비교 분석]\n· 분자식은 같지만 구조가 다름을 모델로 확인하고, 차이를 표로 정리한다.", "closing": "[결과 공유 및 성찰]\n· 모둠별로 만든 이성질체 모델을 공유 보드에 게시하고 상호 관람한다.\n· 다음 차시에 이성질체의 구조 차이를 물질의 성질과 연결할 것을 예고한다."}}], "id": "ch18", "pdf": "pdf/ch18.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집(생물의 유전-태안고-이준근).pdf", "meta": {"curriculum": "2022", "subject": "생물의 유전", "teacher": "이준근 (태안고등학교)", "unit": "Ⅱ. 유전자의 발현 – 01. 유전자 발현 과정", "code": "[12유전02-01]", "standard": "전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고, 모형을 이용하여 유전자발현 과정을 설명할 수 있다.", "category": "과학·수학", "school": "태안고등학교", "teacher_name": "이준근"}, "stage1": {"total_periods": "3차시", "explanation": "[12유전02-01] 전사와 번역 과정을 거쳐 유전자가 발현되는 중심원리를 이해하고,\n단백질 합성 과정 모의실험을 통해 유전자발현 과정을 설명할 수 있다.", "know": "• 중심원리 ⋅전사와 번역", "skill": "• 생물 특징과 생명 활동 관계 추론하기\n• 생명 현상에서 문제 발견 및 가설 설정하기\n• 생명과학 탐구 설계, 수행 및 조사하기\n• 생명과학적 근거를 기반으로 자료 해석, 분석 및 결론 도출하기\n• 모형 생성하여 생명 현상 설명하기\n• 다양한 매체를 활용하여 협력적 소통하기", "value": "• 과학의 심미적 가치\n• 과학 유용성\n• 자연과 과학에 대한 감수성\n• 과학 창의성\n• 과학 활동의 윤리성\n• 과학 문제 해결에 대한 개방성\n• 안전⋅지속가능 사회에 기여\n• 과학 문화 향유", "eval_goal": "• 모형을 통해 전사와 번역 과정을 단계별로 이해하며, 모둠별 협업 활동을 통해\n협력적으로 소통하는 과정을 평가한다.", "eval_content": "• 전사와 번역 과정 단계별로 설명하기\n• 모둠별 협업 활동을 통해 모형을 바탕으로 중심원리 설명하기", "eval_method": "• 수행평가: 전사와 번역 과정을 설명하는 모형과 자료 제작\n• 발표평가: 모둠별 모형(중심원리) 발표\n• 자기 및 동료평가: 활동 참여도 및 의사소통 태도 평가"}, "lessons": [{"topic": "유전자와 단백질은 어떤 관계일까?", "concept": "유전자발현, 유전자와 효소의 관계, 아르지닌 합성 경로, 1유전자 1효소설", "method": "■ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "1/3", "steps": {"intro": "[사례 살펴보기]\n영국의 내과의사 개로드는 ‘알캅톤뇨증’을 연구하여 다음과 같이 설명하였다.\n1. 알캅톤뇨증은 유전병이다.\n2. 이 질환은 타이로신의 물질대사에 필요한 효소가 결핍되어 나타난다.\n[질문 제시하기]\n개로드의 알캅톤뇨증 연구 사례를 살펴봤을 때, 유전자는 물질대사에 필요한 특정\n산물의 합성에 관여한다고 할 수 있다. 이때, 특정 산물이란 어떤 것일까?", "body": "[학습 목표 확인하기]\n▶ 비들과 테이텀의 실험을 이해하고, 아르지닌 합성 경로를 설명할 수 있다.\n▶ 유전자, 단백질, 형질의 관계를 바르게 추론할 수 있다.\n[기초 개념 확인하기]\n▶ 유전자발현: 유전자에 담긴 유전정보에 따라 단백질과 같은 기능적 산물이 합성\n되는 과정\n▶ 최소배지: 생명체가 살아가는 데 필요한 최소한의 영양물질만 들어 있는 배지이다.\n야생형 붉은빵곰팡이는 최소배지에서 성장에 필요한 모든 물질을 합\n성할 수 있다."}}, {"topic": "유전정보의 흐름은 어떻게 될까?", "concept": "1유전자 1단백질설, 1유전자 1폴리펩타이드설, 중심원리, 유전정보의 흐름", "method": "■ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "2/3", "steps": {"intro": "[사례 살펴보기]\n헤모글로빈의 구조적 특징\n1. 헤모글로빈은 서로 다른 폴리펩타이드로 구성되어 있다.\n2. 헤모글로빈을 구성하는 폴리펩타이드는 α 2개, β 개다.\n[질문 제시하기]\n지난 시간에 유전자가 효소를 합성을 결정한다는 1유전자 1효소설을 학습했다. 그\n렇다면 헤모글로빈을 이루는 폴리펩타이드는 어떻게 합성되는 걸까?", "body": "[학습 목표 확인하기]\n▶ 1유전자 1단백질설과 1유전자 1폴리펩타이드설이 무엇인지 설명할 수 있다.\n▶ 유전정보의 흐름을 이해하고 전사 과정을 설명할 수 있다.\n[기초 개념 확장하기]\n▶ 1유전자 1단백질설: 유전자가 효소뿐만 아니라 단백질 합성에도 관여한다는 가설\n▶ 1유전자 1폴리펩타이드설: 유전자가 각각의 폴리펩타이드 합성에 관여한다는 가설"}}, {"topic": "전사의 3단계는 어떻게 일어날까?", "concept": "전사, 프로모터, 개시, 신장, 종결", "method": "■ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의•토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/3", "steps": {"intro": "[사례 살펴보기]\nDNA가 복제되는 방식 알아보기\n1. DNA 중합효소가 관여하고, RNA 조각인 프라이머가 필요하다.\n2. 합성되는 가닥은 선도 가닥과 지연 가닥으로 나뉜다.\n3. DNA 복제는 항상 5‘→3’ 방향으로 합성된다.\n[질문 제시하기]\nDNA에서 RNA가 합성되는 전사는 복제 과정과 어떤 차이가 있을까?", "body": "[학습 목표 확인하기]\n▶ 전사 과정을 단계별로 설명할 수 있다.\n▶ DNA 복제 과정과 전과 과정의 차이점을 비교하여 설명할 수 있다.\n[심화 개념 탐구하기]\n▶ 프로모터(촉진유전자): RNA 중합효소가 결합하여 전사가 시작되는 DNA의 특정한\n염기서열\n▶ 1유전자 1폴리펩타이드설: 유전자가 각각의 폴리펩타이드 합성에 관여한다는 가설"}}], "id": "ch19", "pdf": "pdf/ch19.pdf"}, {"file": "26-1 정규외 교수학습 운영 도움 자료집(인문학과 윤리-충남온라인학교-송달호).pdf", "meta": {"curriculum": "2022", "subject": "인문학과 윤리", "teacher": "송달호 (충남온라인학교)", "unit": "Ⅱ-Ⅳ. 타인과 관계 맺기, 자유와 평등\n철학자 유니버스: 사상가 탐구를 통한 현대\n사회 문제 해결", "code": "12인문학과윤리04-04", "standard": "동서양 사상가의 핵심 사상을 탐구하고, 이를 현대 사회의 다양한 문제 상황에 적 용하여 윤리적 해결 방안을 제시할 수 있다.", "category": "인문·사회", "school": "충남온라인학교", "teacher_name": "송달호"}, "stage1": {"total_periods": "4차시", "explanation": "동서양의 다양한 윤리·사회 사상가들의 핵심 사상을 탐구하여 비판적·창의적 사고\n로 자신만의 해석을 도출하고, AI 도구를 활용한 가상 인터뷰와 시각화 콘텐츠 제\n작 등의 디지털 활동을 통해 사상가의 사상을 현대 사회의 윤리적 쟁점에 적용해\n보는 활동을 강조한다.", "know": "·동서양 윤리·사회 사상가의 핵심 사상(인간관/윤리관/사회관/국가관 등)\n·사상가의 사상이 현대 사회에 주는 시사점\n·다양한 사회 문제와 윤리적 쟁점에 대한 이해", "skill": "·사상가의 입장을 비교·분석하여 자신의 관점 정립하기\n·AI도구를 활용해 사상을 현대적 문제에 적용·재해석하기\n·사상가 캐릭터화·시각화 자료로 창의적 표현하기", "value": "·다양한 사상에 대한 개방적·비판적 태도\n·사상가의 한계 인식과 자기 사고의 책임감\n·공동체 문제 해결에 참여하는 시민적 덕성", "eval_goal": "사상가의 핵심 사상을 정확히 이해하고, 이를 바탕으로 현대 사회의 문제에 대한\n윤리적 해결 방안을 논리적으로 제시할 수 있는지를 평가한다.", "eval_content": "① 사상가 선정 및 핵심 사상의 정리(인간관·윤리관·사회관 등4개 이상)\n② AI활용 가상 인터뷰 질문·답변·자신의 생각(4개 이상)\n③ 철학자 히어로 캐릭터 설계 및 현대 문제 해결 전략(PPT)\n④ 발표 및 상호 평가 참여도", "eval_method": "·수행평가(활동지·기록지·산출물 종합 평가)\n·발표 평가(퀴즈앤 보드 상호 평가 포함)\n·자기 성찰 평가(생활기록부 활용 자기 평가)"}, "lessons": [{"topic": "AI 대화형 도구 활용 가상 사회 이슈 인터뷰", "concept": "· AI 도구의 활용과 한계 · 사상가의 입장에서 사회 문제 분석 · 비판적 사고", "method": "□ 협동학습 ■ 탐구학습 ■ 문제중심학습 □ 토의·토론학습\n□ 프로젝트 학습 □ 거꾸로학습 ■ 블랜디드 러닝 □ 기타( )", "period": "2/4", "steps": {"intro": "[탐구 목표 확인]\n·1차시에서 정리한 사상가의 핵심 사상을 바탕으로, 그 사상가가 현대 사회 문제에 어떤 답\n을 줄지 추론한다.\n·AI대화형 도구(ChatGPT, 아숙업)의 강점과 한계 안내\n- 강점: 다양한 사상가의 입장을 빠르게 시뮬레이션\n- 한계: 잘못된 정보·일반화된 답변 가능성→ 반드시 비판적 검증 필요\n[준비 점검- 퀴즈앤 활용]\n·퀴즈앤 미니 퀴즈: 본인이 선정한 사상가의 핵심 개념 5문제 자가 점검", "body": "[학습 목표 안내]\n·동서양 사상가 중 1인을 선정하고, 그의 핵심 사상(인간관·윤리관·사회관·국가관 등)을 4가지\n이상 정리할 수 있다.\n[사상가 둘러보기- 퀴즈앤 활용]\n·퀴즈앤 퀴즈쇼: 10명의 대표 사상가 핵심 키워드 매칭 퀴즈 진행\n(공자·맹자·순자·이황·이이·정약용·플라톤·아리스토텔레스·칸트·밀·롤스·마르크스·키르케고르 등)\n·모둠별로 흥미로운 사상가 후보군 3명 압축→ 모둠 토의로 1명 최종 선정\n[핵심 사상 정리(활동지1 활용)]\n·교과서·학습지를 참고해 선정한 사상가의 핵심 사상을 4가지 카테고리로 정리\n(① 인간관② 윤리관/덕관③ 사회관/국가관④ 이상사회·이상적 인간상)\n·모둠 내 동료 점검: 빠진 내용·잘못된 해석 상호 보완", "closing": "[정리 및 다음 차시 예고]\n·모둠 발표(2분 이내): 우리가 선택한 사상가와 그 이유\n·퀴즈앤 보드에\"내 사상가 한 줄 소개\" 게시\n·다음 차시 예고: AI 대화형 도구(ChatGPT, 아숙업)를 활용한 가상 인터뷰\n·과제 안내: 가상 인터뷰에 던질 \"오늘날의 사회 문제\" 질문 후보 2~3개 미리 구상해 오기"}}, {"topic": "철학자 히어로 캐릭터 설계 및 콘텐츠 제작", "concept": "· 사상의 캐릭터화·시각화 · 현대 문제 해결 전략 설계 · 디지털 도구 활용", "method": "■ 협동학습 □ 탐구학습 □ 문제중심학습 □ 토의·토론학습\n■ 프로젝트 학습 □ 거꾸로학습 □ 블랜디드 러닝 □ 기타( )", "period": "3/4", "steps": {"body": "[히어로 캐릭터 설계(활동지3 - 히어로 설계 워크시트)]\n·캐릭터 이름·능력·상징· 핸드 시그니처 설계\n- 능력은 사상의 핵심 개념을 형상화(예: \"정언명령 빔\", \"양지 확충 실드\", \"사단지심 컨트롤\")\n·위기 상황 설정: 본인이 해결하고 싶은 현대 사회 문제 1가지 구체화\n[사고 프로세스(히어로 의사결정) 작성- 철학적 질문4단계]\n①문제 인식: 사태의 윤리적 쟁점을 어떻게 식별하는가?\n②이론 적용: 사상가의 핵심 개념 const DATA = window.EBOOK_DATA || [];

const el = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
// linkify URLs inside text (already escaped)
function linkify(s){
  return esc(s).replace(/(https?:\/\/[^\s<)]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
// turn "· item\n· item" into <ul> when it looks like a bullet list
function asList(s){
  if(!s) return "";
  const lines = s.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const bullety = lines.filter(l=>/^[·⦁•\-]/.test(l)).length;
  if(lines.length>1 && bullety>=Math.max(1,lines.length-1)){
    return "<ul>"+lines.map(l=>"<li>"+linkify(l.replace(/^[·⦁•\-]\s*/,""))+"</li>").join("")+"</ul>";
  }
  return "<p>"+linkify(s).replace(/\n/g,"<br>")+"</p>";
}

function buildNav(){

  CAT_ORDER.forEach(cat=>{
    const docs = DATA.filter(d=>d.meta.category===cat);
    if(!docs.length) return;
    const m = CAT_META[cat];
    html += `<div class="nav-cat"><div class="nav-cat-label"><span class="nav-cat-dot" style="background:${m.c}"></span>${esc(cat)}</div>`;
    docs.forEach(d=>{
      html += `<button class="nav-item" data-id="${d.id}" style="color:#cfe3e2"><span>${esc(displaySubject(d))}</span> <span class="ni-sub">${esc(teacherLabel(d))}</span></button>`;
    });
    html += `</div>`;
  });
  nav.innerHTML = html;
  nav.querySelector("[data-home]").addEventListener("click",()=>{go(null)});
  nav.querySelectorAll(".nav-item").forEach(b=>{
    b.addEventListener("click",()=>go(b.dataset.id));
  });
}
function setActiveNav(id){
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.id===id));

}

    <div class="cover-stats">

      <div class="cstat"><div class="num">${totalLessons}</div><div class="lab">차시 설계안</div></div>
      <div class="cstat"><div class="num">${schools}</div><div class="lab">참여 학교</div></div>
      <div class="cstat"><div class="num">${CAT_ORDER.filter(c=>DATA.some(d=>d.meta.category===c)).length}</div><div class="lab">교과 영역</div></div>
    </div>
  </div>
  <div class="home-intro">
    <div class="section-eyebrow">이 자료집을 여는 법</div>
    <p>왼쪽 목차에서 과목을 선택하거나 아래 카드를 눌러 각 과목의 수업 설계를 펼쳐 보세요. 모든 과목은 <b>1단계 교육과정 분석</b>과 <b>2단계 차시별 교수·학습 설계안</b>으로 구성되어 있으며, 각 과목 상단에서 원본 PDF도 바로 열람·내려받을 수 있습니다.</p>
  </div>`;

  CAT_ORDER.forEach(cat=>{
    const docs = DATA.filter(d=>d.meta.category===cat);
    if(!docs.length) return;
    const m = CAT_META[cat];
    html += `<div class="cat-block"><div class="cat-block-head"><span class="cbh-dot" style="background:${m.c}"></span><h3>${esc(cat)}</h3><span class="cbh-count">${docs.length} SUBJECTS</span></div><div class="card-grid">`;
    docs.forEach(d=>{
      html += cardHTML(d,m);
    });
    html += `</div></div>`;
  });
  el("content").innerHTML = html;
  el("content").querySelectorAll(".subj-card").forEach(c=>c.addEventListener("click",()=>go(c.dataset.id)));
}
function cardHTML(d,m){
  return `<button class="subj-card" data-id="${d.id}" style="--c:${m.c}">
    <div class="sc-top">
      <div class="sc-subject">${esc(displaySubject(d))}</div>
      <div class="sc-cur">${esc(d.meta.curriculum||"")}</div>
    </div>
    <div class="sc-unit">${esc(d.meta.unit||"")}</div>
    <div class="sc-meta">
      <span class="sc-teacher">${esc(teacherLabel(d))}</span>
      <span class="sep">·</span>
      <span>${esc(d.meta.school||"")}</span>
      <span class="sc-periods">${d.lessons.length}차시</span>
    </div>
  </button>`;
}

/* ---------- CHAPTER ---------- */
function renderChapter(d){
  const m = CAT_META[d.meta.category];
  const s1 = d.stage1;
  const idx = DATA.findIndex(x=>x.id===d.id);
  const prev = DATA[idx-1], next = DATA[idx+1];

  const analysisRows = [];
  if(s1.total_periods) analysisRows.push(["총 차시", `<p>${esc(s1.total_periods)}</p>`]);
  if(s1.explanation) analysisRows.push(["성취기준 해설", asList(s1.explanation)]);

  let html = `<div class="chapter">
    <div class="ch-hero" style="--c:${m.c};--c-deep:${m.deep}">
      <div class="ch-cat"><span class="dot"></span>${esc(d.meta.category)}</div>
      <h2>${esc(displaySubject(d))}</h2>
      <div class="ch-unit">${esc(d.meta.unit||"")}</div>
      <div class="ch-hero-meta">
        <span class="chm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 2 8l10 5 10-5-10-5Z"/><path d="M6 10.5V16c0 1 2.7 3 6 3s6-2 6-3v-5.5"/></svg>${esc(d.meta.curriculum||"")} 개정 교육과정</span>
        <span class="chm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></svg>${esc(d.meta.teacher||"")}</span>
        ${d.meta.code?`<span class="chm"><span class="code">${esc(d.meta.code)}</span></span>`:""}
      </div>
    </div>

    <div class="ch-actions">
      <button class="btn primary" data-pdf="${esc(d.pdf)}" data-title="${esc(displaySubject(d))} · ${esc(d.meta.teacher||"")}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/></svg>원본 PDF 보기</button>
      <a class="btn" href="${esc(d.pdf)}" download><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>PDF 내려받기</a>
      <button class="btn" onclick="window.print()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/></svg>인쇄</button>
    </div>`;

  if(d.meta.standard){
    html += `<div class="standard-box"><div class="sb-lab">성취기준</div><p>${esc(d.meta.standard)}</p></div>`;
  }

  /* STAGE 1 */
  html += `<div class="stage-head"><div class="stage-num">1</div><div><h3>교육과정 분석하기</h3><div class="sh-sub">성취기준 해설 · 내용 요소 · 평가 계획</div></div></div>`;

  if(analysisRows.length){
    html += `<div class="a-grid">`;
    analysisRows.forEach(([lab,val])=>{
      html += `<div class="a-row"><div class="a-lab">${esc(lab)}</div><div class="a-val">${val}</div></div>`;
    });
    html += `</div>`;
  }

  if(s1.know||s1.skill||s1.value){
    html += `<div class="elements">
      ${elementCard("지식·이해","M12 2 2 7l10 5 10-5-10-5Z M2 17l10 5 10-5 M2 12l10 5 10-5",s1.know)}
      ${elementCard("과정·기능","M14.7 6.3a5 5 0 0 0-7.4 6.6l-4 4a1 1 0 0 0 1.4 1.4l4-4a5 5 0 0 0 6.6-7.4l-2.3 2.3-1.4-1.4Z",s1.skill)}
      ${elementCard("가치·태도","M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6.5 5.5 5.5 0 0 1 21.5 12C19 16.5 12 21 12 21Z",s1.value)}
    </div>`;
  }

  const evalItems = [];
  if(s1.eval_goal) evalItems.push(["평가 목표",s1.eval_goal]);
  if(s1.eval_content) evalItems.push(["평가 내용",s1.eval_content]);
  if(s1.eval_method) evalItems.push(["평가 방법",s1.eval_method]);
  if(evalItems.length){
    html += `<div class="eval-wrap">`;
    evalItems.forEach(([lab,val])=>{
      html += `<div class="eval-item"><div class="ev-lab">${esc(lab)}</div><div class="ev-val">${asList(val)}</div></div>`;
    });
    html += `</div>`;
  }

  /* STAGE 2 */
  html += `<div class="stage-head"><div class="stage-num">2</div><div><h3>차시별 교수·학습 설계안</h3><div class="sh-sub">${d.lessons.length}개 차시</div></div></div>`;
  html += `<p class="lessons-intro">각 차시를 눌러 도입 · 전개 · 정리 활동을 펼쳐 보세요.</p>`;
  d.lessons.forEach((L,i)=>{
    html += lessonHTML(L,i===0);
  });

  /* pager */
  html += `<div class="ch-pager">
    ${prev?`<button class="pager-btn" data-id="${prev.id}"><div class="pager-dir">← 이전</div><div class="pager-title">${esc(displaySubject(prev))}</div></button>`:`<div class="pager-btn empty"></div>`}
    ${next?`<button class="pager-btn next" data-id="${next.id}"><div class="pager-dir">다음 →</div><div class="pager-title">${esc(displaySubject(next))}</div></button>`:`<div class="pager-btn empty"></div>`}
  </div>`;

  html += `</div>`;
  el("content").innerHTML = html;

  // wire events
  el("content").querySelector("[data-pdf]").addEventListener("click",e=>{
    const b=e.currentTarget;openModal(b.dataset.pdf,b.dataset.title);
  });
  el("content").querySelectorAll(".lesson-head").forEach(h=>{
    h.addEventListener("click",()=>h.parentElement.classList.toggle("open"));
  });
  el("content").querySelectorAll(".pager-btn[data-id]").forEach(b=>{
    b.addEventListener("click",()=>go(b.dataset.id));
  });
}

function elementCard(title,pathD,content){
  return `<div class="el-card">
    <div class="el-head"><span class="el-ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${pathIcons(title)}</svg></span>${esc(title)}</div>
    ${asList(content||"")}
  </div>`;
}
function pathIcons(t){
  if(t.startsWith("지식")) return '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>';
  if(t.startsWith("과정")) return '<path d="M14.7 6.3a5 5 0 0 0-7.4 6.6l-4 4a1 1 0 0 0 1.4 1.4l4-4a5 5 0 0 0 6.6-7.4l-2.3 2.3-1.4-1.4z"/>';
  return '<path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6.5 5.5 5.5 0 0 1 21.5 12C19 16.5 12 21 12 21z"/>';
}

function lessonHTML(L,open){
  const [cur,tot] = (L.period||"/").split("/");
  const methods = parseMethods(L.method);
  const steps = [["도입","intro"],["전개","body"],["정리","closing"]].filter(([_,k])=>L.steps[k]);
  return `<div class="lesson${open?" open":""}">
    <div class="lesson-head">
      <div class="lesson-period"><span class="lp-cur">${esc(cur||"·")}</span><span class="lp-tot">/${esc(tot||"·")}</span></div>
      <div class="lesson-titles">
        <div class="lesson-topic">${esc(L.topic||"차시 설계")}</div>
        ${L.concept?`<div class="lesson-concept">핵심 개념 · ${esc(L.concept)}</div>`:""}
      </div>
      <svg class="lesson-chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="lesson-body">
      ${methods.length?`<div class="lb-methods">${methods.map(mm=>`<span class="method-chip">${esc(mm)}</span>`).join("")}</div>`:""}
      ${L.concept?`<div class="lb-concept"><b>핵심 개념</b> — ${esc(L.concept)}</div>`:""}
      <div class="steps">
        ${steps.map(([name,key])=>`
          <div class="step">
            <div class="step-label"><span class="sl-name">${name}</span><span class="step-marker"></span></div>
            <div class="step-content"><div class="sc-text">${linkify(L.steps[key])}</div></div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}
function parseMethods(s){
  if(!s) return [];
  const out=[];
  // find selected (■) methods
  const re=/([■☑✔])\s*([^□■☑✔()\n]+)/g;let m;
  while((m=re.exec(s))){
    const name=m[2].replace(/\s+/g," ").trim();
    if(name && name.length<20) out.push(name);
  }
  // fallback: if none marked, take any labels after removing checkboxes
  if(!out.length){
    s.split(/[□■\n]/).map(x=>x.trim()).filter(x=>x&&x.length<20&&!/기타/.test(x)).forEach(x=>out.push(x));
  }
  return out.slice(0,8);
}

/* ---------- MODAL ---------- */
function openModal(src,title){
  el("modalFrame").src = src;
  el("modalTitle").textContent = title;
  el("modalDownload").href = src;
  el("modal").classList.add("show");
  document.body.style.overflow="hidden";
}
function closeModal(){
  el("modal").classList.remove("show");
  el("modalFrame").src="about:blank";
  document.body.style.overflow="";
}
el("modalClose").addEventListener("click",closeModal);
el("modal").addEventListener("click",e=>{if(e.target===el("modal"))closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});

/* ---------- SEARCH ---------- */
function runSearch(q){
  q=q.trim().toLowerCase();
  if(!q){renderHome();setActiveNav(null);return;}
  const hits = DATA.filter(d=>{
    const hay=[d.meta.subject,d.meta.teacher,d.meta.school,d.meta.unit,d.meta.standard,d.meta.code,d.meta.category,
      d.stage1.explanation,d.stage1.know,d.stage1.skill,
      ...d.lessons.map(l=>l.topic+" "+l.concept)].join(" ").toLowerCase();
    return hay.includes(q);
  });
  let html=`<div class="home-intro"><div class="section-eyebrow">검색 결과 · "${esc(q)}"</div><p>${hits.length}개 과목을 찾았습니다.</p></div>`;
  if(!hits.length){
    html+=`<div class="no-results"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><p>검색 결과가 없습니다. 다른 키워드로 시도해 보세요.</p></div>`;
  }else{
    html+=`<div class="card-grid">`;
    hits.forEach(d=>html+=cardHTML(d,CAT_META[d.meta.category]));
    html+=`</div>`;
  }
  el("content").innerHTML=html;
  el("content").querySelectorAll(".subj-card").forEach(c=>c.addEventListener("click",()=>go(c.dataset.id)));
  setActiveNav(null);
}
let searchTimer;
el("search").addEventListener("input",e=>{
  clearTimeout(searchTimer);
  const v=e.target.value;
  searchTimer=setTimeout(()=>runSearch(v),160);
});

/* ---------- ROUTER ---------- */
function go(id){
  if(!id){
    renderHome();setActiveNav(null);location.hash="";
  }else{
    const d=DATA.find(x=>x.id===id);
    if(!d){renderHome();return;}
    renderChapter(d);setActiveNav(id);location.hash=id;
  }
  el("content").scrollTop=0;
  window.scrollTo(0,0);
  closeSidebar();
}
window.addEventListener("hashchange",()=>{
  const h=location.hash.replace("#","");
  if(h && DATA.find(x=>x.id===h)) {if(!document.querySelector(".nav-item.active[data-id='"+h+"']")) go(h);}
});

/* ---------- SIDEBAR (mobile) ---------- */
function openSidebar(){el("sidebar").classList.add("open");el("scrim").classList.add("show")}
function closeSidebar(){el("sidebar").classList.remove("open");el("scrim").classList.remove("show")}
el("menuBtn").addEventListener("click",openSidebar);
el("scrim").addEventListener("click",closeSidebar);

/* ---------- INIT ---------- */
buildNav();
const initHash=location.hash.replace("#","");
if(initHash && DATA.find(x=>x.id===initHash)) go(initHash);
else renderHome();
</script>
