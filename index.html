<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#DAF2FC">
<meta name="description" content="온마당 공지사항 — 충남 고교학점제 종합지원 포털">
<title>온마당 · 충남 고교학점제 종합지원 포털</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="./assets/css/common.css">
<style>
  /* ── 게시판 ── */
  .board-wrap{padding:40px 0 80px}
  .board-box{background:var(--surface);border-radius:0 var(--radius) var(--radius) var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}

  /* 필터 바 */
  .filter-bar{display:flex;align-items:center;gap:10px;padding:18px 24px;border-bottom:1px solid var(--line)}
  .filter-btn{
    font-size:13px;font-weight:600;padding:6px 14px;border-radius:var(--radius-pill);
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.15s;
  }
  .filter-btn:hover,.filter-btn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .filter-total{margin-left:auto;font-size:13px;color:var(--ink-faint)}

  /* 목록 */
  .notice-table{width:100%;border-collapse:collapse}
  .notice-table thead th{
    font-size:12.5px;font-weight:700;color:var(--ink-faint);
    padding:12px 16px;background:var(--soft);text-align:left;
    border-bottom:1px solid var(--line);
  }
  .notice-table thead th.col-num{width:64px;text-align:center}
  .notice-table thead th.col-date{width:90px;text-align:center}
  .notice-table tbody tr{border-bottom:1px solid var(--line);transition:.15s;cursor:pointer}
  .notice-table tbody tr:last-child{border:none}
  .notice-table tbody tr:hover{background:var(--soft)}
  .notice-table td{padding:16px}
  .notice-table td.col-num{text-align:center;font-size:13px;color:var(--ink-faint)}
  .notice-table td.col-date{text-align:center;font-size:13px;color:var(--ink-faint);white-space:nowrap}
  .title-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .title-text{font-size:15px;font-weight:500;color:var(--ink)}
  .title-text:hover{color:var(--brand)}
  .has-attach{font-size:13px;color:var(--ink-faint);margin-left:2px}

  /* 배지 */
  .nb{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0}
  .nb.imp{background:#fde8e8;color:#c0392b}
  .nb.new{background:#e3f6e3;color:var(--accent-d)}
  .nb.on{background:#d6effa;color:var(--online-d)}

  /* 로딩·비어있음·에러 */
  .state-box{padding:72px 24px;text-align:center;color:var(--ink-faint)}
  .state-box .ico{font-size:40px;margin-bottom:14px}
  .state-box p{font-size:15px}
  .state-box small{font-size:12.5px;color:var(--ink-faint);display:block;margin-top:6px}
  .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 페이지네이션 */
  .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:24px}
  .pg-btn{
    min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;border:1px solid var(--line);background:#fff;
    font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;padding:0 10px;
  }
  .pg-btn:hover{border-color:var(--brand);color:var(--brand)}
  .pg-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .pg-btn:disabled{opacity:.35;cursor:default;pointer-events:none}

  /* 게시판 탭 */
  .board-tab{display:flex;gap:4px}
  .tab-item{
    font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius) var(--radius) 0 0;
    color:var(--ink-soft);background:var(--soft);border:1px solid var(--line);border-bottom:none;transition:.15s;
  }
  .tab-item:hover{color:var(--brand)}
  .tab-item.active{background:var(--surface);color:var(--brand);border-bottom:2px solid var(--surface);margin-bottom:-1px;position:relative}
</style>
</head>
<body>

<div id="om-header" data-active="board"></div>

<!-- ── 페이지 헤더 ── -->
<div class="page-hero">
  <div class="wrap">
    <nav class="breadcrumb" aria-label="이동 경로">
      <a href="./index.html">홈</a> › <span>알림·소통 마당</span> › <strong>공지사항</strong>
    </nav>
    <h1>공지사항</h1>
    <p>충남 고교학점제 관련 주요 안내와 공지를 확인하세요.</p>
  </div>
</div>

<!-- ── 게시판 본문 ── -->
<main class="board-wrap">
  <div class="wrap">
    <!-- 게시판 탭 -->
    <nav class="board-tab" aria-label="게시판 탭">
      <a href="./index.html" class="tab-item active" aria-current="page">공지사항</a>
      <a href="./board/resources.html" class="tab-item">자료실</a>
    </nav>
    <div class="board-box">

      <div class="filter-bar">
        <button class="filter-btn on" onclick="setFilter(this,'all')">전체</button>
        <button class="filter-btn" onclick="setFilter(this,'중요')">중요</button>
        <button class="filter-btn" onclick="setFilter(this,'온라인')">온라인</button>
        <span class="filter-total" id="total-count"></span>
      </div>

      <div id="list-area">
        <div class="state-box">
          <div class="spinner" role="status" aria-label="불러오는 중"></div>
          <p>공지사항을 불러오는 중입니다…</p>
        </div>
      </div>

      <div class="pagination" id="pagination" aria-label="페이지 탐색"></div>
    </div>
  </div>
</main>

<div id="om-footer"></div>

<script src="./assets/js/common.js"></script>
<script>
const REPO        = 'curricenterhscne/onmadang';
const BASE        = `https://api.github.com/repos/${REPO}/issues`;
const NOTICE_PAGE = './board/notice.html'; // 루트 기준 상세 경로
const PER         = 20;

let currentPage   = 1;
let currentFilter = 'all';
let totalCount    = 0;

const BADGE_MAP = {
  '중요':'<span class="nb imp">중요</span>',
  '신규':'<span class="nb new">신규</span>',
  '온라인':'<span class="nb on">온라인</span>',
};

function getBadges(labels){
  return labels.filter(l=>BADGE_MAP[l.name]).map(l=>BADGE_MAP[l.name]).join('');
}
function fmtDate(iso){
  const d=new Date(iso);
  return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateFull(iso){
  const d=new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function hasAttachment(body){
  if(!body)return false;
  return /!\[.*?\]\(https?:\/\/github\.com\/user-attachments|!\[.*?\]\(https?:\/\/user-images\.githubusercontent/.test(body)
      || /\[.*?\]\(https?:\/\/github\.com\/user-attachments/.test(body);
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchIssues(page,label){
  let url=`${BASE}?state=open&labels=공지&per_page=${PER}&page=${page}&direction=desc`;
  if(label&&label!=='all')url+=`&labels=공지,${encodeURIComponent(label)}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(`GitHub API 오류: ${res.status}`);
  return{data:await res.json(),link:res.headers.get('Link')||''};
}
async function fetchTotal(label){
  let url=`${BASE}?state=open&labels=공지&per_page=1&page=1`;
  if(label&&label!=='all')url+=`,${encodeURIComponent(label)}`;
  const res=await fetch(url);
  const link=res.headers.get('Link')||'';
  const m=link.match(/[?&]page=(\d+)>; rel="last"/);
  if(m)return parseInt(m[1]);
  return(await res.json()).length;
}

function renderList(issues){
  if(!issues.length){
    return`<div class="state-box"><div class="ico">📋</div><p>등록된 공지사항이 없습니다.</p></div>`;
  }
  const rows=issues.map((issue,idx)=>{
    const num=totalCount-((currentPage-1)*PER)-idx;
    const badges=getBadges(issue.labels);
    const attach=hasAttachment(issue.body)?'<span class="has-attach" title="첨부파일 있음">📎</span>':'';
    const date=fmtDate(issue.created_at);
    const dateStr=fmtDateFull(issue.created_at);
    const url=`${NOTICE_PAGE}?id=${issue.number}`;
    return`
      <tr onclick="location.href='${url}'" role="link" tabindex="0"
          onkeydown="if(event.key==='Enter')location.href='${url}'">
        <td class="col-num">${num>0?num:'–'}</td>
        <td>
          <div class="title-cell">
            ${badges}
            <a class="title-text" href="${url}" onclick="event.stopPropagation()">${escHtml(issue.title)}</a>
            ${attach}
          </div>
        </td>
        <td class="col-date"><time datetime="${issue.created_at}" title="${dateStr}">${date}</time></td>
      </tr>`;
  }).join('');
  return`
    <table class="notice-table" role="grid" aria-label="공지사항 목록">
      <thead>
        <tr>
          <th class="col-num" scope="col">번호</th>
          <th scope="col">제목</th>
          <th class="col-date" scope="col">날짜</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderPagination(total,current){
  const pages=Math.ceil(total/PER);
  const el=document.getElementById('pagination');
  el.innerHTML='';
  if(pages<=1)return;
  const mkBtn=(label,page,disabled,active)=>{
    const btn=document.createElement('button');
    btn.className='pg-btn'+(active?' active':'');
    btn.textContent=label;
    btn.disabled=disabled;
    if(!disabled&&!active)btn.onclick=()=>loadPage(page);
    el.appendChild(btn);
  };
  mkBtn('‹ 이전',current-1,current===1,false);
  const start=Math.max(1,current-2),end=Math.min(pages,start+4);
  for(let p=start;p<=end;p++)mkBtn(String(p),p,false,p===current);
  mkBtn('다음 ›',current+1,current===pages,false);
}

async function loadPage(page){
  currentPage=page;
  document.getElementById('list-area').innerHTML=
    `<div class="state-box"><div class="spinner" role="status"></div><p>불러오는 중…</p></div>`;
  document.getElementById('pagination').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
  try{
    const[{data},total]=await Promise.all([
      fetchIssues(page,currentFilter),
      currentPage===1?fetchTotal(currentFilter):Promise.resolve(totalCount),
    ]);
    if(currentPage===1){
      totalCount=total;
      if(data.length<PER)totalCount=data.length;
    }
    document.getElementById('total-count').textContent=`총 ${totalCount}건`;
    document.getElementById('list-area').innerHTML=renderList(data);
    renderPagination(totalCount,page);
  }catch(err){
    document.getElementById('list-area').innerHTML=`
      <div class="state-box">
        <div class="ico">⚠️</div>
        <p>공지사항을 불러오지 못했습니다.</p>
        <small>${escHtml(err.message)}</small>
        <small style="margin-top:10px">
          <button onclick="loadPage(1)" style="font:inherit;cursor:pointer;padding:8px 18px;border:1px solid var(--line);border-radius:var(--radius-pill);background:#fff">다시 시도</button>
        </small>
      </div>`;
  }
}

function setFilter(btn,label){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentFilter=label;
  totalCount=0;
  loadPage(1);
}

loadPage(1);
</script>

<script data-goatcounter="https://onmadang.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
