<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#DAF2FC">
<meta name="description" content="온마당 공지사항 — 충남 고교학점제 종합지원 포털">
<title>온마당 · 충남 고교학점제 종합지원 포털</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#DAF2FC; --brand:#4F6EBE; --brand-d:#3a539b; --brand-l:#6d8ad6;
    --accent:#7BCE7C; --accent-d:#5fb260; --online:#7EC8E3; --online-d:#2a8db5;
    --ink:#1f2b44; --ink-soft:#51607d; --ink-faint:#8597ad;
    --line:#c5dcef; --surface:#fff; --soft:#eef7fc;
    --radius:18px; --radius-sm:12px; --radius-pill:999px;
    --shadow:0 6px 24px rgba(79,110,190,.13);
    --shadow-sm:0 2px 10px rgba(79,110,190,.10);
    --maxw:860px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  a{text-decoration:none;color:inherit}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .clover{display:inline-block;vertical-align:middle}

  /* ── 리뉴얼 안내 배너 ── */
  .renewal-banner{
    background:#e8edf8;border-bottom:1px solid #c0cce8;
    color:var(--brand-d);text-align:center;
    font-size:13.5px;font-weight:600;padding:11px 20px;line-height:1.6;
  }

  /* ── 헤더 ── */
  header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav{
    display:flex;align-items:center;gap:12px;height:68px;
    max-width:1180px;margin:0 auto;padding:0 24px;
  }
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
  .brand-txt b{font-size:18px;color:var(--brand);font-weight:800;display:block;letter-spacing:-.4px;line-height:1.1}
  .brand-txt span{font-size:10.5px;color:var(--ink-soft);font-weight:500}

  /* GNB */
  .nav-links{display:flex;gap:2px;margin-left:16px;flex:1;flex-wrap:wrap}
  .nav-links a{
    font-size:14px;font-weight:600;color:var(--ink-soft);
    padding:8px 13px;border-radius:var(--radius-pill);transition:.18s;
  }
  .nav-links a:hover{background:var(--soft);color:var(--brand)}
  .nav-links a.active{background:var(--brand);color:#fff}
  /* 미완성 메뉴: 회색, 클릭 불가 */
  .nav-disabled{
    font-size:14px;font-weight:600;color:#bbc5d4;
    padding:8px 13px;border-radius:var(--radius-pill);
    cursor:default;pointer-events:none;user-select:none;
  }

  /* 헤더 우측 도구 */
  .head-tools{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .head-link{
    display:flex;align-items:center;gap:5px;flex-shrink:0;
    background:#fff;color:var(--brand);font-weight:700;font-size:13.5px;
    padding:9px 16px;border-radius:var(--radius-pill);
    border:1.5px solid var(--brand);transition:.18s;
  }
  .head-link:hover{background:var(--soft)}
  .head-cta{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
    background:var(--accent);color:#1c3d1d;font-weight:700;font-size:13.5px;
    padding:9px 16px;border-radius:var(--radius-pill);transition:.18s;
  }
  .head-cta:hover{background:var(--accent-d)}

  /* ── 페이지 헤더 ── */
  .page-hero{background:linear-gradient(135deg,var(--brand),var(--brand-l));color:#fff;padding:52px 0 44px}
  .page-hero h1{font-size:clamp(24px,3.5vw,34px);font-weight:800;letter-spacing:-.8px;margin-bottom:8px}
  .page-hero p{font-size:14.5px;opacity:.85}

  /* ── 게시판 ── */
  .board-wrap{padding:40px 0 80px}
  .board-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}

  /* 필터 바 */
  .filter-bar{display:flex;align-items:center;gap:10px;padding:18px 24px;border-bottom:1px solid var(--line)}
  .filter-btn{
    font-size:13px;font-weight:600;padding:6px 14px;border-radius:var(--radius-pill);
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.15s;
  }
  .filter-btn:hover,.filter-btn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .filter-total{margin-left:auto;font-size:13px;color:var(--ink-faint)}

  /* 목록 */
  .notice-table{width:100%;border-collapse:collapse}
  .notice-table thead th{
    font-size:12.5px;font-weight:700;color:var(--ink-faint);
    padding:12px 16px;background:var(--soft);text-align:left;
    border-bottom:1px solid var(--line);
  }
  .notice-table thead th.col-num{width:64px;text-align:center}
  .notice-table thead th.col-date{width:90px;text-align:center}
  .notice-table tbody tr{border-bottom:1px solid var(--line);transition:.15s;cursor:pointer}
  .notice-table tbody tr:last-child{border:none}
  .notice-table tbody tr:hover{background:var(--soft)}
  .notice-table td{padding:16px}
  .notice-table td.col-num{text-align:center;font-size:13px;color:var(--ink-faint)}
  .notice-table td.col-date{text-align:center;font-size:13px;color:var(--ink-faint);white-space:nowrap}
  .title-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .title-text{font-size:15px;font-weight:500;color:var(--ink)}
  .title-text:hover{color:var(--brand)}
  .has-attach{font-size:13px;color:var(--ink-faint);margin-left:2px}

  /* 배지 */
  .nb{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0}
  .nb.imp{background:#fde8e8;color:#c0392b}
  .nb.new{background:#e3f6e3;color:var(--accent-d)}
  .nb.on{background:#d6effa;color:var(--online-d)}

  /* 로딩·비어있음·에러 */
  .state-box{padding:72px 24px;text-align:center;color:var(--ink-faint)}
  .state-box .ico{font-size:40px;margin-bottom:14px}
  .state-box p{font-size:15px}
  .state-box small{font-size:12.5px;color:var(--ink-faint);display:block;margin-top:6px}
  .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 페이지네이션 */
  .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:24px}
  .pg-btn{
    min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;border:1px solid var(--line);background:#fff;
    font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;padding:0 10px;
  }
  .pg-btn:hover{border-color:var(--brand);color:var(--brand)}
  .pg-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .pg-btn:disabled{opacity:.35;cursor:default;pointer-events:none}

  /* 푸터 */
  footer{background:var(--brand-d);color:rgba(255,255,255,.7);padding:32px 0;text-align:center;font-size:13px}
  footer a{color:rgba(255,255,255,.7)}
  footer a:hover{color:#fff}

  /* 햄버거 */
  .hamburger{
    display:none;background:none;border:none;font-size:26px;
    color:var(--brand);cursor:pointer;margin-left:auto;padding:4px;
  }
  /* 모바일 메뉴 */
  .mobile-menu{
    display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
    background:rgba(0,0,0,.4);opacity:0;transition:opacity .25s;
  }
  .mobile-menu.open{display:block;opacity:1}
  .mobile-menu-panel{
    position:absolute;top:0;right:0;width:min(320px,85vw);height:100%;
    background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);
    padding:24px;overflow-y:auto;
    transform:translateX(100%);transition:transform .25s;
  }
  .mobile-menu.open .mobile-menu-panel{transform:translateX(0)}
  .mobile-menu-close{
    display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border:none;background:var(--soft);
    border-radius:50%;font-size:20px;cursor:pointer;margin-left:auto;margin-bottom:20px;
  }
  .mobile-menu-nav{display:flex;flex-direction:column;gap:4px}
  .mobile-menu-nav a{display:block;font-size:15px;font-weight:600;color:var(--ink-soft);padding:12px 16px;border-radius:var(--radius-sm);transition:.15s}
  .mobile-menu-nav a:hover{background:var(--soft);color:var(--brand)}
  .mobile-menu-nav a.active{background:var(--brand);color:#fff}
  .mobile-menu-nav .disabled{color:#bbc5d4;padding:12px 16px;font-size:15px;font-weight:600}
  .mobile-menu-divider{height:1px;background:var(--line);margin:12px 0}
  .mobile-menu-shortcuts{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .mobile-menu-shortcuts a{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--brand);padding:10px 14px;background:var(--soft);border-radius:var(--radius-sm);transition:.15s}
  .mobile-menu-shortcuts a:hover{background:var(--line)}

  @media(max-width:900px){
    .head-link span{display:none}
  }
  @media(max-width:680px){
    .nav-links,.nav-disabled,.head-tools{display:none}
    .hamburger{display:block}
  }
</style>
</head>

<script>
const REPO        = 'curricenterhscne/onmadang';
const BASE        = `https://api.github.com/repos/${REPO}/issues`;
const NOTICE_PAGE = './board/notice.html'; // 루트 기준 상세 경로
const PER         = 20;

let currentPage   = 1;
let currentFilter = 'all';
let totalCount    = 0;

const BADGE_MAP = {
  '중요':'<span class="nb imp">중요</span>',
  '신규':'<span class="nb new">신규</span>',
  '온라인':'<span class="nb on">온라인</span>',
};

function getBadges(labels){
  return labels.filter(l=>BADGE_MAP[l.name]).map(l=>BADGE_MAP[l.name]).join('');
}
function fmtDate(iso){
  const d=new Date(iso);
  return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateFull(iso){
  const d=new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function hasAttachment(body){
  if(!body)return false;
  return /!\[.*?\]\(https?:\/\/github\.com\/user-attachments|!\[.*?\]\(https?:\/\/user-images\.githubusercontent/.test(body)
      || /\[.*?\]\(https?:\/\/github\.com\/user-attachments/.test(body);
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchIssues(page,label){
  let url=`${BASE}?state=open&labels=공지&per_page=${PER}&page=${page}&direction=desc`;
  if(label&&label!=='all')url+=`&labels=공지,${encodeURIComponent(label)}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(`GitHub API 오류: ${res.status}`);
  return{data:await res.json(),link:res.headers.get('Link')||''};
}
async function fetchTotal(label){
  let url=`${BASE}?state=open&labels=공지&per_page=1&page=1`;
  if(label&&label!=='all')url+=`,${encodeURIComponent(label)}`;
  const res=await fetch(url);
  const link=res.headers.get('Link')||'';
  const m=link.match(/[?&]page=(\d+)>; rel="last"/);
  if(m)return parseInt(m[1]);
  return(await res.json()).length;
}

function renderList(issues){
  if(!issues.length){
    return`<div class="state-box"><div class="ico">📋</div><p>등록된 공지사항이 없습니다.</p></div>`;
  }
  const rows=issues.map((issue,idx)=>{
    const num=totalCount-((currentPage-1)*PER)-idx;
    const badges=getBadges(issue.labels);
    const attach=hasAttachment(issue.body)?'<span class="has-attach" title="첨부파일 있음">📎</span>':'';
    const date=fmtDate(issue.created_at);
    const dateStr=fmtDateFull(issue.created_at);
    const url=`${NOTICE_PAGE}?id=${issue.number}`;
    return`
      <tr onclick="location.href='${url}'" role="link" tabindex="0"
          onkeydown="if(event.key==='Enter')location.href='${url}'">
        <td class="col-num">${num>0?num:'–'}</td>
        <td>
          <div class="title-cell">
            ${badges}
            <a class="title-text" href="${url}" onclick="event.stopPropagation()">${escHtml(issue.title)}</a>
            ${attach}
          </div>
        </td>
        <td class="col-date"><time datetime="${issue.created_at}" title="${dateStr}">${date}</time></td>
      </tr>`;
  }).join('');
  return`
    <table class="notice-table" role="grid" aria-label="공지사항 목록">
      <thead>
        <tr>
          <th class="col-num" scope="col">번호</th>
          <th scope="col">제목</th>
          <th class="col-date" scope="col">날짜</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderPagination(total,current){
  const pages=Math.ceil(total/PER);
  const el=document.getElementById('pagination');
  el.innerHTML='';
  if(pages<=1)return;
  const mkBtn=(label,page,disabled,active)=>{
    const btn=document.createElement('button');
    btn.className='pg-btn'+(active?' active':'');
    btn.textContent=label;
    btn.disabled=disabled;
    if(!disabled&&!active)btn.onclick=()=>loadPage(page);
    el.appendChild(btn);
  };
  mkBtn('‹ 이전',current-1,current===1,false);
  const start=Math.max(1,current-2),end=Math.min(pages,start+4);
  for(let p=start;p<=end;p++)mkBtn(String(p),p,false,p===current);
  mkBtn('다음 ›',current+1,current===pages,false);
}

async function loadPage(page){
  currentPage=page;
  document.getElementById('list-area').innerHTML=
    `<div class="state-box"><div class="spinner" role="status"></div><p>불러오는 중…</p></div>`;
  document.getElementById('pagination').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
  try{
    const[{data},total]=await Promise.all([
      fetchIssues(page,currentFilter),
      currentPage===1?fetchTotal(currentFilter):Promise.resolve(totalCount),
    ]);
    if(currentPage===1)totalCount=total;
    document.getElementById('total-count').textContent=`총 ${totalCount}건`;
    document.getElementById('list-area').innerHTML=renderList(data);
    renderPagination(totalCount,page);
  }catch(err){
    document.getElementById('list-area').innerHTML=`
      <div class="state-box">
        <div class="ico">⚠️</div>
        <p>공지사항을 불러오지 못했습니다.</p>
        <small>${escHtml(err.message)}</small>
        <small style="margin-top:10px">
          <button onclick="loadPage(1)" style="font:inherit;cursor:pointer;padding:8px 18px;border:1px solid var(--line);border-radius:var(--radius-pill);background:#fff">다시 시도</button>
        </small>
      </div>`;
  }
}

function setFilter(btn,label){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentFilter=label;
  totalCount=0;
  loadPage(1);
}

loadPage(1);
</script>

<script>
// 모바일 메뉴 토글
(function(){
  var menu=document.getElementById('mobileMenu');
  var openBtn=document.querySelector('.hamburger');
  var closeBtn=menu.querySelector('.mobile-menu-close');
  function open(){menu.classList.add('open');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden'}
  function close(){menu.classList.remove('open');menu.setAttribute('aria-hidden','true');document.body.style.overflow=''}
  openBtn.addEventListener('click',open);
  closeBtn.addEventListener('click',close);
  menu.addEventListener('click',function(e){if(e.target===menu)close()});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&menu.classList.contains('open'))close()});
})();
</script>
